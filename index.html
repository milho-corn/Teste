<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Simulador de Batalha</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: #fff;
    }

    .tela {
      display: none;
    }

    .ativa {
      display: block;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }

    .barra {
      width: 200px;
      height: 20px;
      background: #555;
      margin: 10px auto;
      border-radius: 10px;
      overflow: hidden;
    }

    .vida {
      height: 100%;
      background: limegreen;
      width: 100%;
      transition: width 0.3s;
    }

    .dano {
      animation: dano 0.3s;
    }

    @keyframes dano {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>

<body>

  <!-- Tela inicial -->
  <div id="menu" class="tela ativa">
    <h1>🎮 Simulador de Batalha</h1>
    <button onclick="iniciar()">Start Game</button>
  </div>

  <!-- Tela do jogo -->
  <div id="jogo" class="tela">
    <h2>Jogador</h2>
    <div class="barra">
      <div id="vidaPlayer" class="vida"></div>
    </div>

    <h2>Inimigo</h2>
    <div class="barra">
      <div id="vidaEnemy" class="vida"></div>
    </div>

    <button onclick="atacar()">Atacar</button>
    <button onclick="curar()">Curar</button>

    <h3 id="log"></h3>
  </div>

  <script>
    let hpPlayer = 100;
    let hpEnemy = 100;

    function iniciar() {
      document.getElementById("menu").classList.remove("ativa");
      document.getElementById("jogo").classList.add("ativa");
      atualizarBarras();
    }

    function atualizarBarras() {
      document.getElementById("vidaPlayer").style.width = hpPlayer + "%";
      document.getElementById("vidaEnemy").style.width = hpEnemy + "%";
    }

    function animarDano() {
      document.body.classList.add("dano");
      setTimeout(() => {
        document.body.classList.remove("dano");
      }, 300);
    }

    function atacar() {
      let danoPlayer = Math.floor(Math.random() * 20) + 5;
      let danoEnemy = Math.floor(Math.random() * 15) + 5;

      hpEnemy -= danoPlayer;
      hpPlayer -= danoEnemy;

      document.getElementById("log").innerText =
        "Você causou " + danoPlayer + " e recebeu " + danoEnemy;

      animarDano();
      checarFim();
      atualizarBarras();
    }

    function curar() {
      let cura = Math.floor(Math.random() * 15) + 5;
      hpPlayer += cura;

      let danoEnemy = Math.floor(Math.random() * 15) + 5;
      hpPlayer -= danoEnemy;

      document.getElementById("log").innerText =
        "Curou " + cura + " mas recebeu " + danoEnemy;

      animarDano();
      checarFim();
      atualizarBarras();
    }

    function checarFim() {
      if (hpPlayer <= 0) {
        alert("💀 Você perdeu!");
        location.reload();
      }
      if (hpEnemy <= 0) {
        alert("🏆 Você venceu!");
        location.reload();
      }
    }
  </script>

</body>
</html>
