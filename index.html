<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG Estável</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #fff;
  text-align: center;
}

#menu, #game { display: none; }

#startScreen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
}

.character-grid {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 40px;
}

.card {
  width: 220px;
  border: 3px solid #444;
  padding: 25px;
  cursor: pointer;
  font-size: 20px;
}

button {
  position: relative;
  padding: 20px 25px;
  margin: 10px;
  border: 2px solid #444;
  cursor: pointer;
  font-size: 16px;
  min-width: 180px;
  overflow: hidden;
  background: white;
}

.ult {
  border-color: gold;
  color: #b8860b;
  font-weight: bold;
}

/* cooldown visual */
.cooldown-fill {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 100%;
  background: rgba(120,120,120,0.65);
  transform-origin: left;
  transform: scaleX(0);
  z-index: 1;
}

button span {
  position: relative;
  z-index: 2;
}

.bar-container {
  width: 340px;
  border: 2px solid #444;
  margin: 10px auto;
  position: relative;
}

.bar {
  height: 24px;
  transition: 0.3s;
}

.player { background: green; }
.enemy { background: red; }

.bar-label {
  position: absolute;
  width: 100%;
  top: 0;
  left: 0;
  font-size: 14px;
  color: white;
  font-weight: bold;
  text-shadow: 1px 1px 2px black;
}

#damageText {
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>Mini RPG</h1>
  <button onclick="startGame()">START</button>
</div>

<div id="menu">
  <h2>Escolha</h2>
  <div class="character-grid">
    <div class="card" onclick="select('kael')">🔥 Kael</div>
    <div class="card" onclick="select('lyra')">🌪️ Lyra</div>
    <div class="card" onclick="select('dopamina')">✨ Dopamina</div>
  </div>
</div>

<div id="game">
  <h2 id="name"></h2>

  <div class="bar-container">
    <div id="playerHp" class="bar player"></div>
    <div class="bar-label" id="playerLabel"></div>
  </div>

  <div class="bar-container">
    <div id="enemyHp" class="bar enemy"></div>
    <div class="bar-label" id="enemyLabel"></div>
  </div>

  <p id="status"></p>
  <p id="damageText"></p>

  <div id="actions"></div>
</div>

<script>

let player = null;
let enemy = { hp: 100 };

let playerTurn = true;
let round = 1;
let gameOver = false;

let shield = false;
let skipEnemyTurn = false;

/* cooldown em segundos */
let cooldown = {
  double:0,
  smoke:0,
  dash:0,
  ult:0
};

const maxCooldown = {
  double:10,
  smoke:10,
  dash:10,
  ult:5
};

/* SKILLS */
const skills = {
  kael: [
    {name:"Dupla", key:"double", dmg:2},
    {name:"Fumaça", key:"smoke", effect:"skip"},
    {name:"Investida", key:"dash", dmg:2},
    {name:"ULT", key:"ult", dmg:4, ult:true}
  ],
  lyra: [
    {name:"Ar", key:"double", dmg:2},
    {name:"Voo", key:"dash", dmg:2},
    {name:"Proteção", key:"smoke", effect:"shield"},
    {name:"ULT", key:"ult", dmg:5, ult:true}
  ],
  dopamina: [
    {name:"Pisa", key:"double", dmg:2},
    {name:"Lacre", key:"dash", dmg:2},
    {name:"Shantay", key:"smoke", effect:"shield"},
    {name:"ULT", key:"ult", dmg:6, ult:true}
  ]
};

function startGame(){
  startScreen.style.display="none";
  menu.style.display="block";
}

function select(char){

  player = {
    id: char,
    name: char,
    hp: 100,
    atk: 8,
    mag: 6
  };

  enemy.hp = 100;
  gameOver = false;
  round = 1;

  menu.style.display="none";
  game.style.display="block";

  update();
}

function clamp(v){ return Math.max(0,Math.min(100,v)); }
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

function checkGameOver(){

  if(enemy.hp <= 0){
    enemy.hp = 0;
    gameOver = true;
    update();
    alert("Você venceu!");
    return true;
  }

  if(player.hp <= 0){
    player.hp = 0;
    gameOver = true;
    update();
    alert("Você perdeu!");
    return true;
  }

  return false;
}

function update(){

  if(!player) return;

  player.hp = clamp(player.hp);
  enemy.hp = clamp(enemy.hp);

  playerHp.style.width = player.hp+"%";
  enemyHp.style.width = enemy.hp+"%";

  playerLabel.innerText = player.name + " ("+player.hp+"%)";
  enemyLabel.innerText = "Inimigo ("+enemy.hp+"%)";

  status.innerText = gameOver
    ? "Fim de jogo"
    : `Rodada ${round} | ${playerTurn?"Sua vez ⚔️":"Inimigo..."}`;

  render();
}

/* cooldown tick */
setInterval(() => {
  for(let k in cooldown){
    if(cooldown[k] > 0) cooldown[k]--;
  }
  render();
}, 1000);

function endTurn(){
  if(gameOver) return;
  playerTurn = false;
  update();
  setTimeout(enemyTurn,1200);
}

async function enemyTurn(){

  if(gameOver) return;

  if(skipEnemyTurn){
    skipEnemyTurn = false;
    round++;
    playerTurn = true;
    update();
    return;
  }

  let dmg = Math.floor(Math.random()*10)+5;

  if(shield){
    dmg = Math.floor(dmg*0.5);
    shield = false;
  }

  player.hp -= dmg;
  damageText.innerText = "Inimigo causou "+dmg;

  if(checkGameOver()) return;

  await delay(1200);

  round++;
  playerTurn = true;
  update();
}

function pct(key){
  if(!player) return 0;
  return cooldown[key] > 0 ? cooldown[key]/maxCooldown[key] : 0;
}

function canUse(key){
  return player && cooldown[key] <= 0 && playerTurn && !gameOver;
}

function useSkill(key){

  if(!player) return;

  let list = skills[player.id] || [];
  let skill = list.find(s => s.key === key);

  if(!skill || !canUse(key)) return;

  cooldown[key] = maxCooldown[key];

  if(skill.dmg){
    enemy.hp -= player.atk * skill.dmg;
    damageText.innerText = skill.name;
  }

  if(skill.effect === "skip") skipEnemyTurn = true;
  if(skill.effect === "shield") shield = true;

  if(skill.ult){
    enemy.hp -= player.atk * skill.dmg;
  }

  if(checkGameOver()) return;
  endTurn();
}

function render(){

  if(!player){
    actions.innerHTML = "";
    return;
  }

  let list = skills[player.id] || [];

  actions.innerHTML = list.map(s => {

    let fill = pct(s.key);
    let disabled = !canUse(s.key);

    return `
      <button onclick="useSkill('${s.key}')"
        ${disabled ? "disabled" : ""}
        class="${s.ult ? 'ult' : ''}">

        <div class="cooldown-fill" style="transform:scaleX(${fill})"></div>
        <span>${s.name}${cooldown[s.key]>0 ? ` (${cooldown[s.key]})` : ''}</span>
      </button>
    `;
  }).join("");
}

</script>

</body>
</html>
