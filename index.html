<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG Estável</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #fff;
  text-align: center;
}

/* TELAS */
#menu { display: none; }
#game { display: none; }

#startScreen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
}

/* PERSONAGENS */
.character-grid {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 40px;
}

.card {
  width: 220px;
  border: 3px solid #444;
  padding: 25px;
  cursor: pointer;
  font-size: 20px;
  transition: 0.2s;
}

.card:hover {
  background: #eee;
  transform: scale(1.05);
}

/* BOTÕES */
button {
  padding: 18px 25px;
  margin: 10px;
  border: 2px solid #444;
  cursor: pointer;
  font-size: 16px;
  min-width: 160px;
}

button:disabled {
  opacity: 0.4;
}

/* BARRAS */
.bar-container {
  width: 340px;
  border: 2px solid #444;
  margin: 10px auto;
  position: relative;
}

.bar {
  height: 24px;
  transition: 0.3s;
}

.player { background: green; }
.enemy { background: red; }

/* NOME NA BARRA */
.bar-label {
  position: absolute;
  width: 100%;
  top: 0;
  left: 0;
  font-size: 14px;
  color: white;
  font-weight: bold;
  text-shadow: 1px 1px 2px black;
}

/* TEXTO */
#damageText {
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>Mini RPG</h1>
  <button onclick="startGame()">START</button>
</div>

<div id="menu">
  <h2>Escolha</h2>
  <div class="character-grid">
    <div class="card" onclick="select('kael')">🔥 Kael</div>
    <div class="card" onclick="select('lyra')">🌪️ Lyra</div>
    <div class="card" onclick="select('dopamina')">✨ Dopamina</div>
  </div>
</div>

<div id="game">
  <h2 id="name"></h2>

  <div class="bar-container">
    <div id="playerHp" class="bar player"></div>
    <div class="bar-label" id="playerLabel"></div>
  </div>

  <div class="bar-container">
    <div id="enemyHp" class="bar enemy"></div>
    <div class="bar-label" id="enemyLabel">Inimigo</div>
  </div>

  <p id="status"></p>
  <p id="damageText"></p>

  <div id="actions"></div>
</div>

<script>

let player = {};
let enemy = { hp: 100 };

let playerTurn = true;
let round = 1;
let gameOver = false;

let shield = false;
let skipEnemyTurn = false;

let cooldown = { double:0, smoke:0, dash:0, ult:0 };

function startGame(){
  startScreen.style.display="none";
  menu.style.display="block";
}

function select(char){

  if(char==="kael") player={name:"Kael",hp:100,atk:9,mag:4};
  if(char==="lyra") player={name:"Lyra",hp:100,atk:5,mag:7};
  if(char==="dopamina") player={name:"Dopamina",hp:100,atk:8,mag:8};

  menu.style.display="none";
  game.style.display="block";

  update();
}

function clamp(v){ return Math.max(0,Math.min(100,v)); }
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* GAME OVER */
function checkGameOver(){

  if(enemy.hp <= 0){
    enemy.hp = 0;
    gameOver = true;
    update(); // 🔥 força atualizar barra antes do alert
    setTimeout(()=>alert("Você venceu!"),300);
    return true;
  }

  if(player.hp <= 0){
    player.hp = 0;
    gameOver = true;
    update();
    setTimeout(()=>alert("Você perdeu!"),300);
    return true;
  }

  return false;
}

function update(){

  player.hp = clamp(player.hp);
  enemy.hp = clamp(enemy.hp);

  playerHp.style.width = player.hp+"%";
  enemyHp.style.width = enemy.hp+"%";

  playerLabel.innerText = player.name + " ("+player.hp+"%)";
  enemyLabel.innerText = "Inimigo ("+enemy.hp+"%)";

  status.innerText = gameOver
    ? "Fim de jogo"
    : `Rodada ${round} | ${playerTurn?"Sua vez ⚔️":"Inimigo..."}`;

  render();
}

function endTurn(){
  if(gameOver) return;
  playerTurn=false;
  update();
  setTimeout(enemyTurn,1200);
}

async function enemyTurn(){

  if(gameOver) return;

  if(skipEnemyTurn){
    skipEnemyTurn=false;
    round++;
    playerTurn=true;
    update();
    return;
  }

  let dmg = Math.floor(Math.random()*10)+5;

  if(shield){
    dmg = Math.floor(dmg*0.5);
    shield=false;
  }

  player.hp -= dmg;
  damageText.innerText = "Inimigo causou "+dmg;

  if(checkGameOver()) return;

  await delay(1200);

  round++;
  playerTurn=true;
  update();
}

/* ===== KAEL ===== */
function kael_double(){
  if(!playerTurn || cooldown.double || gameOver) return;
  cooldown.double=2;
  enemy.hp -= player.atk*2;
  damageText.innerText="Dupla flamejante";
  if(checkGameOver()) return;
  endTurn();
}

function kael_smoke(){
  if(!playerTurn || cooldown.smoke || gameOver) return;
  cooldown.smoke=3;
  skipEnemyTurn=true;
  damageText.innerText="Fumaça";
  endTurn();
}

function kael_dash(){
  if(!playerTurn || cooldown.dash || gameOver) return;
  cooldown.dash=2;
  enemy.hp -= player.atk*2;
  damageText.innerText="Investida";
  if(checkGameOver()) return;
  endTurn();
}

function kael_ult(){
  if(!playerTurn || round<3 || cooldown.ult || gameOver) return;
  cooldown.ult=5;
  enemy.hp -= player.atk*4;
  damageText.innerText="FATALIDADE";
  if(checkGameOver()) return;
  endTurn();
}

/* ===== LYRA ===== */
function lyra_air(){
  if(!playerTurn || cooldown.double || gameOver) return;
  cooldown.double=2;
  enemy.hp -= player.mag*2;
  damageText.innerText="Sopro de ar";
  if(checkGameOver()) return;
  endTurn();
}

function lyra_fly(){
  if(!playerTurn || cooldown.dash || gameOver) return;
  cooldown.dash=2;
  enemy.hp -= player.atk*2;
  damageText.innerText="Voo bravo";
  if(checkGameOver()) return;
  endTurn();
}

function lyra_shield(){
  if(!playerTurn || cooldown.smoke || gameOver) return;
  cooldown.smoke=3;
  shield=true;
  damageText.innerText="Proteção";
  endTurn();
}

function lyra_ult(){
  if(!playerTurn || round<3 || cooldown.ult || gameOver) return;
  cooldown.ult=5;
  enemy.hp -= player.mag*5;
  damageText.innerText="Furacão";
  if(checkGameOver()) return;
  endTurn();
}

/* ===== DOPAMINA ===== */
function dopamina_pisa(){
  if(!playerTurn || cooldown.double || gameOver) return;
  cooldown.double=2;
  enemy.hp -= player.atk*2;
  damageText.innerText="Pisa menos!";
  if(checkGameOver()) return;
  endTurn();
}

function dopamina_lacre(){
  if(!playerTurn || cooldown.dash || gameOver) return;
  cooldown.dash=2;
  enemy.hp -= player.mag*2;
  damageText.innerText="Lacre agudo";
  if(checkGameOver()) return;
  endTurn();
}

function dopamina_shantay(){
  if(!playerTurn || cooldown.smoke || gameOver) return;
  cooldown.smoke=3;
  shield=true;
  damageText.innerText="Shantay!";
  endTurn();
}

function dopamina_ult(){
  if(!playerTurn || round<3 || cooldown.ult || gameOver) return;
  cooldown.ult=5;
  enemy.hp -= player.mag*6;
  damageText.innerText="Sashay away!";
  if(checkGameOver()) return;
  endTurn();
}

/* RENDER */
function render(){

  let ultReady = round>=3 && cooldown.ult===0;

  if(player.name==="Kael"){
    actions.innerHTML=`
    <button onclick="kael_double()">Dupla</button>
    <button onclick="kael_smoke()">Fumaça</button>
    <button onclick="kael_dash()">Investida</button>
    <button onclick="kael_ult()" ${!ultReady?"disabled":""}>ULT</button>`;
  }

  if(player.name==="Lyra"){
    actions.innerHTML=`
    <button onclick="lyra_air()">Ar</button>
    <button onclick="lyra_fly()">Voo</button>
    <button onclick="lyra_shield()">Proteção</button>
    <button onclick="lyra_ult()" ${!ultReady?"disabled":""}>ULT</button>`;
  }

  if(player.name==="Dopamina"){
    actions.innerHTML=`
    <button onclick="dopamina_pisa()">Pisa</button>
    <button onclick="dopamina_lacre()">Lacre</button>
    <button onclick="dopamina_shantay()">Shantay</button>
    <button onclick="dopamina_ult()" ${!ultReady?"disabled":""}>ULT</button>`;
  }
}

</script>

</body>
</html>
