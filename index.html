<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG Estável</title>

<style>
body {
  font-family: "Courier New", monospace;
  background: #fff;
  text-align: center;
}

/* START */
#startScreen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
}

#startScreen button {
  padding: 15px 25px;
  font-size: 18px;
  cursor: pointer;
  border: 2px solid #444;
  background: #eee;
}

/* MENU */
#menu { display: none; }

.character-grid {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.card {
  width: 180px;
  border: 3px solid #444;
  padding: 15px;
  cursor: pointer;
  background: #f5f5f5;
}

.card:hover {
  transform: scale(1.05);
}

/* GAME */
#game { display: none; }

button {
  padding: 10px;
  margin: 5px;
  border: 2px solid #444;
  background: #eee;
  cursor: pointer;
}

button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.bar-container {
  width: 300px;
  border: 2px solid #444;
  margin: 10px auto;
  background: #ddd;
}

.bar {
  height: 18px;
  transition: 0.2s;
}

.player { background: green; }
.enemy { background: red; }

#damageText {
  height: 20px;
  margin: 10px;
  font-weight: bold;
  color: #b30000;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <h1>Mini RPG</h1>
  <button onclick="startGame()">START THE GAME</button>
</div>

<!-- MENU -->
<div id="menu">
  <h2>Escolha seu personagem</h2>

  <div class="character-grid">
    <div class="card" onclick="select('kael')">
      <h3>🔥 Kael</h3>
      <p>Assassino de fogo</p>
    </div>

    <div class="card" onclick="select('lyra')">
      <h3>🌪️ Lyra</h3>
      <p>Manipuladora de ar</p>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <h2 id="name"></h2>

  <div class="bar-container">
    <div id="playerHp" class="bar player"></div>
  </div>

  <div class="bar-container">
    <div id="enemyHp" class="bar enemy"></div>
  </div>

  <p id="status"></p>
  <p id="damageText"></p>

  <div id="actions"></div>
</div>

<script>

/* ======================
   START FLOW
====================== */

function startGame() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("menu").style.display = "block";
}

/* ======================
   ESTADO
====================== */

let player = {};
let enemy = { hp: 100 };

let playerTurn = true;
let round = 1;
let gameOver = false;

let shield = false;
let skipEnemyTurn = false;

/* COOLDOWNS */
let cooldown = {
  double: 0,
  smoke: 0,
  dash: 0,
  ult: 0
};

/* ======================
   SELECT
====================== */

function select(char) {

  if (char === "kael") {
    player = { name:"Kael", hp:100, atk:9, mag:4 };
  }

  if (char === "lyra") {
    player = { name:"Lyra", hp:100, atk:5, mag:7 };
  }

  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  start();
}

function start() {
  document.getElementById("name").innerText = player.name;
  render();
  update();
}

/* ======================
   UTIL
====================== */

function clamp(v){
  return Math.max(0, Math.min(100, v));
}

function delay(ms){
  return new Promise(r => setTimeout(r, ms));
}

function showDamage(text){
  document.getElementById("damageText").innerText = text;
}

/* ======================
   GAME OVER
====================== */

function checkGameOver() {
  if (enemy.hp <= 0) {
    gameOver = true;
    alert("Você venceu!");
    location.reload();
  }

  if (player.hp <= 0) {
    gameOver = true;
    alert("Você perdeu!");
    location.reload();
  }
}

/* ======================
   TURN SYSTEM
====================== */

function endTurn() {

  if (gameOver) return;

  playerTurn = false;
  render();
  update();

  setTimeout(enemyTurn, 1200); // ⏳ mais lento
}

async function enemyTurn() {

  if (skipEnemyTurn) {
    skipEnemyTurn = false;
    playerTurn = true;
    round++;
    render();
    update();
    return;
  }

  let dmg = Math.floor(Math.random() * 10) + 5;

  if (shield) {
    dmg = Math.floor(dmg * 0.5);
    shield = false;
  }

  player.hp -= dmg;

  showDamage(`Inimigo causou ${dmg}`);

  checkGameOver();

  await delay(1200); // ⏳ tempo pra ler dano

  round++;
  playerTurn = true;

  render();
  update();
}

/* ======================
   COOLDOWN UPDATE
====================== */

function tickCooldowns(){
  for (let k in cooldown) {
    if (cooldown[k] > 0) cooldown[k]--;
  }
}

/* ======================
   UPDATE UI
====================== */

function update() {

  player.hp = clamp(player.hp);
  enemy.hp = clamp(enemy.hp);

  document.getElementById("playerHp").style.width = player.hp + "%";
  document.getElementById("enemyHp").style.width = enemy.hp + "%";

  document.getElementById("status").innerText =
    `Rodada ${round} | ${playerTurn ? "Sua vez ⚔️" : "Inimigo..."}`;

  tickCooldowns();
}

/* ======================
   KAEL
====================== */

async function kael_double() {
  if (!playerTurn || cooldown.double > 0) return;

  cooldown.double = 2;

  let dmg = Math.floor(player.atk * 1.4);

  enemy.hp -= dmg;

  showDamage(`Kael causou ${dmg}`);

  checkGameOver();
  render();

  await delay(1200);
  endTurn();
}

async function kael_smoke() {
  if (!playerTurn || cooldown.smoke > 0) return;

  cooldown.smoke = 3;

  skipEnemyTurn = true;
  showDamage("Kael usou fumaça!");

  render();
  await delay(1200);
  endTurn();
}

async function kael_dash() {
  if (!playerTurn || cooldown.dash > 0) return;

  cooldown.dash = 2;

  let dmg = player.atk * 2;
  enemy.hp -= dmg;

  showDamage(`Kael causou ${dmg}`);

  checkGameOver();
  render();

  await delay(1200);
  endTurn();
}

async function kael_ult() {
  if (!playerTurn || round < 3 || cooldown.ult > 0) return;

  cooldown.ult = 5;

  let dmg = player.atk * 4;
  enemy.hp -= dmg;

  showDamage(`ULTIMATE! ${dmg}`);

  checkGameOver();
  render();

  await delay(1200);
  endTurn();
}

/* ======================
   LYRA
====================== */

async function lyra_air() {
  if (!playerTurn || cooldown.double > 0) return;

  cooldown.double = 2;

  let dmg = player.mag * 2;
  enemy.hp -= dmg;

  showDamage(`Lyra causou ${dmg}`);

  checkGameOver();
  render();

  await delay(1200);
  endTurn();
}

async function lyra_fly() {
  if (!playerTurn || cooldown.dash > 0) return;

  cooldown.dash = 2;

  let dmg = player.atk * 2;
  enemy.hp -= dmg;

  showDamage(`Lyra atacou ${dmg}`);

  checkGameOver();
  render();

  await delay(1200);
  endTurn();
}

async function lyra_shield() {
  if (!playerTurn || cooldown.smoke > 0) return;

  cooldown.smoke = 3;

  shield = true;
  showDamage("Lyra ativou proteção");

  render();

  await delay(1200);
  endTurn();
}

async function lyra_ult() {
  if (!playerTurn || round < 3 || cooldown.ult > 0) return;

  cooldown.ult = 5;

  let dmg = player.mag * 5;
  enemy.hp -= dmg;

  showDamage(`FURACÃO! ${dmg}`);

  checkGameOver();
  render();

  await delay(1200);
  endTurn();
}

/* ======================
   RENDER BUTTONS
====================== */

function render() {

  let ultReady = round >= 3 && cooldown.ult === 0;

  if (player.name === "Kael") {
    document.getElementById("actions").innerHTML = `
      <button onclick="kael_double()" ${cooldown.double>0?'disabled':''}>Duplo Corte</button>
      <button onclick="kael_smoke()" ${cooldown.smoke>0?'disabled':''}>Fumaça</button>
      <button onclick="kael_dash()" ${cooldown.dash>0?'disabled':''}>Investida</button>
      <button onclick="kael_ult()" ${!ultReady?'disabled':''}>Ultimate</button>
    `;
  }

  if (player.name === "Lyra") {
    document.getElementById("actions").innerHTML = `
      <button onclick="lyra_air()" ${cooldown.double>0?'disabled':''}>Sopro de Ar</button>
      <button onclick="lyra_fly()" ${cooldown.dash>0?'disabled':''}>Voo</button>
      <button onclick="lyra_shield()" ${cooldown.smoke>0?'disabled':''}>Proteção</button>
      <button onclick="lyra_ult()" ${!ultReady?'disabled':''}>Furacão</button>
    `;
  }
}

</script>

</body>
</html>
