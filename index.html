<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG Estável</title>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f5f7fb;
  color: #222;
  text-align: center;
  margin: 0;
}

/* telas */
#menu, #game { display: none; }

#startScreen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
}

/* títulos */
h1, h2 {
  font-weight: 600;
  letter-spacing: 1px;
}

/* personagens */
.character-grid {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin-top: 40px;
}

.card {
  width: 220px;
  border-radius: 16px;
  padding: 25px;
  cursor: pointer;
  font-size: 20px;
  background: white;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: 0.25s;
  border: 1px solid #eee;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.12);
}

/* botões */
button {
  position: relative;
  padding: 16px 20px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 15px;
  min-width: 180px;
  overflow: hidden;
  background: #ffffff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.12);
}

button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ultimate */
.ult {
  background: linear-gradient(135deg, #ffd700, #ffb300);
  color: #222;
  font-weight: bold;
}

/* cooldown */
.cooldown-fill {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 100%;
  background: rgba(0,0,0,0.15);
  transform-origin: left;
  transform: scaleX(0);
  z-index: 1;
}

button span {
  position: relative;
  z-index: 2;
}

/* barras */
.bar-container {
  width: 340px;
  border-radius: 12px;
  margin: 12px auto;
  overflow: hidden;
  background: #e9edf5;
  position: relative;
}

.bar {
  height: 24px;
  transition: 0.3s;
}

/* cores suaves */
.player {
  background: linear-gradient(90deg, #4caf50, #2e7d32);
}

.enemy {
  background: linear-gradient(90deg, #ef5350, #c62828);
}

#playerMana {
  background: linear-gradient(90deg, #42a5f5, #1565c0);
}

.bar-label {
  position: absolute;
  width: 100%;
  top: 0;
  font-size: 13px;
  font-weight: 600;
  color: #222;
}

/* status */
#status {
  margin-top: 10px;
  font-weight: 500;
  color: #555;
}

/* dano */
#damageText {
  font-weight: bold;
  margin-top: 10px;
  color: #ff9800;
  font-size: 17px;
}
  
</style>
</head>

<body>

<div id="startScreen">
  <h1>Mini RPG</h1>
  <button onclick="startGame()">START</button>
</div>

<div id="menu">
  <h2>Escolha</h2>
  <div class="character-grid">
    <div class="card" onclick="select('kael')">🔥 Kael</div>
    <div class="card" onclick="select('lyra')">🌪️ Lyra</div>
    <div class="card" onclick="select('dopamina')">✨ Dopamina</div>
  </div>
</div>

<div id="game">
  <h2 id="name"></h2>

  <div class="bar-container">
    <div id="playerHp" class="bar player"></div>
    <div id="playerMana" class="bar" style="background:blue"></div>
    <div class="bar-label" id="playerLabel"></div>
  </div>

  <div class="bar-container">
    <div id="enemyHp" class="bar enemy"></div>
    <div class="bar-label" id="enemyLabel"></div>
  </div>

  <p id="status"></p>
  <p id="damageText"></p>

  <div id="actions"></div>
</div>

<script>

let player = null;
let enemy = { hp: 100 };

let playerTurn = true;
let round = 1;
let gameOver = false;

let shield = false;
let skipEnemyTurn = false;

/* cooldown */
let cooldown = {
  double:0,
  smoke:0,
  dash:0,
  ult:0
};

const maxCooldown = {
  double:10,
  smoke:10,
  dash:10,
  ult:5
};

/* SKILLS COM MANA */
const skills = {
  kael: [
    {name:"Dupla", key:"double", dmg:2, cost:20},
    {name:"Fumaça", key:"smoke", effect:"skip", cost:25},
    {name:"Investida", key:"dash", dmg:2, cost:20},
    {name:"ULT", key:"ult", dmg:4, ult:true, cost:60}
  ],
  lyra: [
    {name:"Ar", key:"double", dmg:1, cost:15},
    {name:"Voo", key:"dash", dmg:2, cost:20},
    {name:"Proteção", key:"smoke", effect:"shield", cost:30},
    {name:"ULT", key:"ult", dmg:5, ult:true, cost:70}
  ],
  dopamina: [
    {name:"Pisa", key:"double", dmg:2, cost:10},
    {name:"Lacre", key:"dash", dmg:2, cost:15},
    {name:"Shantay", key:"smoke", effect:"shield", cost:25},
    {name:"ULT", key:"ult", dmg:6, ult:true, cost:80}
  ]
};

function startGame(){
  startScreen.style.display="none";
  menu.style.display="block";
}

function select(char){

  player = {
    id: char,
    name: char,
    hp: 100,
    mana: 100,
    maxMana: 100,
    atk: 8,
    mag: 6
  };

  enemy.hp = 100;
  gameOver = false;
  round = 1;
  playerTurn = true;

  menu.style.display="none";
  game.style.display="block";

  update();
}

function clamp(v){ return Math.max(0,Math.min(100,v)); }
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

function checkGameOver(){

  if(enemy.hp <= 0){
    enemy.hp = 0;
    gameOver = true;
    update();
    alert("Você venceu!");
    return true;
  }

  if(player.hp <= 0){
    player.hp = 0;
    gameOver = true;
    update();
    alert("Você perdeu!");
    return true;
  }

  return false;
}

function update(){

  if(!player) return;

  player.hp = clamp(player.hp);
  enemy.hp = clamp(enemy.hp);

  playerHp.style.width = player.hp+"%";
  playerMana.style.width = player.mana+"%";
  enemyHp.style.width = enemy.hp+"%";

  playerLabel.innerText =
    player.name + " HP:" + player.hp + "% | Mana:" + player.mana + "%";

  enemyLabel.innerText = "Inimigo ("+enemy.hp+"%)";

  status.innerText = gameOver
    ? "Fim de jogo"
    : `Rodada ${round} | ${playerTurn?"Sua vez ⚔️":"Inimigo..."}`;

  render();
}

/* cooldown tick + mana regen */
setInterval(() => {

  for(let k in cooldown){
    if(cooldown[k] > 0) cooldown[k]--;
  }

  if(player && player.mana < player.maxMana){
    player.mana += 5;
    if(player.mana > player.maxMana) player.mana = player.maxMana;
  }

  render();

}, 1000);

function endTurn(){
  if(gameOver) return;
  playerTurn = false;
  update();
  setTimeout(enemyTurn,1200);
}

async function enemyTurn(){

  if(gameOver) return;

  if(skipEnemyTurn){
    skipEnemyTurn = false;
    round++;
    playerTurn = true;
    update();
    return;
  }

  let dmg = Math.floor(Math.random()*10)+5;

  if(shield){
    dmg = Math.floor(dmg*0.5);
    shield = false;
  }

  player.hp -= dmg;
  damageText.innerText = "Inimigo causou "+dmg;

  if(checkGameOver()) return;

  await delay(1200);

  round++;
  playerTurn = true;
  update();
}

function pct(key){
  if(!player) return 0;
  return cooldown[key] > 0 ? cooldown[key]/maxCooldown[key] : 0;
}

function canUse(key){

  if(!player || !playerTurn || gameOver) return false;

  let skill = skills[player.id].find(s => s.key === key);

  if(!skill) return false;

  if(cooldown[key] > 0) return false;

  if(player.mana < skill.cost) return false;

  return true;
}

function useSkill(key){

  let skill = skills[player.id].find(s => s.key === key);

  if(!skill || !canUse(key)) return;

  player.mana -= skill.cost;
  cooldown[key] = maxCooldown[key];

  if(skill.dmg){
    enemy.hp -= player.atk * skill.dmg;
    damageText.innerText = skill.name;
  }

  if(skill.effect === "skip") skipEnemyTurn = true;
  if(skill.effect === "shield") shield = true;

  if(skill.ult){
    enemy.hp -= player.atk * skill.dmg;
  }

  if(checkGameOver()) return;
  endTurn();
}

function render(){

  if(!player){
    actions.innerHTML = "";
    return;
  }

  let list = skills[player.id] || [];

  actions.innerHTML = list.map(s => {

    let fill = pct(s.key);
    let disabled = !canUse(s.key);

    return `
      <button onclick="useSkill('${s.key}')"
        ${disabled ? "disabled" : ""}
        class="${s.ult ? 'ult' : ''}">

        <div class="cooldown-fill" style="transform:scaleX(${fill})"></div>
        <span>${s.name} (${s.cost} mana)</span>
      </button>
    `;
  }).join("");
}

</script>

</body>
</html>
