<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG Estável</title>

<style>
body {
  font-family: "Courier New", monospace;
  background: #fff;
  text-align: center;
}

/* ======================
   MENU
====================== */

.character-grid {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.card {
  width: 180px;
  border: 3px solid #444;
  padding: 15px;
  cursor: pointer;
  background: #f5f5f5;
}

.card:hover {
  transform: scale(1.05);
  background: #eaeaea;
}

/* ======================
   GAME
====================== */

button {
  padding: 10px;
  margin: 5px;
  border: 2px solid #444;
  background: #eee;
  cursor: pointer;
}

.bar-container {
  width: 300px;
  border: 2px solid #444;
  margin: 10px auto;
  background: #ddd;
}

.bar {
  height: 18px;
  transition: 0.2s;
}

.player { background: green; }
.enemy { background: red; }

/* 🔥 IMPORTANTE: começa escondido aqui */
#game {
  display: none;
}
</style>
</head>

<body>

<!-- ======================
     MENU
====================== -->

<div id="menu">
  <h2>Escolha seu personagem</h2>

  <div class="character-grid">

    <div class="card" onclick="select('kael')">
      <h3>🔥 Kael</h3>
      <p>Assassino de fogo</p>
    </div>

    <div class="card" onclick="select('lyra')">
      <h3>🌪️ Lyra</h3>
      <p>Manipuladora de ar</p>
    </div>

  </div>
</div>

<!-- ======================
     GAME
====================== -->

<div id="game">
  <h2 id="name"></h2>

  <div class="bar-container">
    <div id="playerHp" class="bar player"></div>
  </div>

  <div class="bar-container">
    <div id="enemyHp" class="bar enemy"></div>
  </div>

  <p id="status"></p>

  <div id="actions"></div>
</div>

<script>

/* ======================
   ESTADO
====================== */

let player = {};
let enemy = { hp: 100 };

let playerTurn = true;

let invisible = false;
let shield = false;

let round = 1;
let skipEnemyTurn = false;

/* ======================
   SELEÇÃO (CORRIGIDA 100%)
====================== */

function select(char) {

  if (char === "kael") {
    player = { name:"Kael", hp:100, atk:9, mag:4, speed:8 };
  }

  if (char === "lyra") {
    player = { name:"Lyra", hp:100, atk:5, mag:7, speed:9 };
  }

  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  playerTurn = true;

  setTimeout(() => {
    start();
  }, 50);
}

/* ======================
   START
====================== */

function start() {
  document.getElementById("name").innerText = player.name;
  render();
  update();
}

/* ======================
   UI
====================== */

function clamp(v){
  return Math.max(0, Math.min(100, v));
}

function update() {

  player.hp = clamp(player.hp);
  enemy.hp = clamp(enemy.hp);

  document.getElementById("playerHp").style.width = player.hp + "%";
  document.getElementById("enemyHp").style.width = enemy.hp + "%";

  document.getElementById("status").innerText =
    `Rodada ${round} | ` +
    (playerTurn ? "Sua vez ⚔️" : "Inimigo atacando 👾");
}

/* ======================
   TURNOS
====================== */

function endTurn() {
  playerTurn = false;
  update();

  setTimeout(enemyTurn, 700);
}

function enemyTurn() {

  if (skipEnemyTurn) {
    skipEnemyTurn = false;
    playerTurn = true;
    round++;
    update();
    return;
  }

  if (invisible) {
    invisible = false;
    playerTurn = true;
    round++;
    update();
    return;
  }

  let dmg = Math.floor(Math.random() * 10) + 5;

  if (shield) {
    dmg = Math.floor(dmg * 0.5);
    shield = false;
  }

  player.hp -= dmg;

  checkEnd();

  round++;

  playerTurn = true;
  update();
}

/* ======================
   KAEL
====================== */

function kael_double() {
  if (!playerTurn) return;

  enemy.hp -= Math.floor(player.atk * 0.7);
  enemy.hp -= Math.floor(player.atk * 0.7);

  finish();
}

function kael_smoke() {
  if (!playerTurn) return;

  skipEnemyTurn = true;

  document.getElementById("status").innerText =
    "Kael usou fumaça! Inimigo perdeu a rodada.";

  finish(false);
}

function kael_dash() {
  if (!playerTurn) return;

  enemy.hp -= player.atk * 2;

  finish();
}

function kael_ult() {
  if (!playerTurn) return;

  enemy.hp -= player.atk * 4;

  finish();
}

/* ======================
   LYRA
====================== */

function lyra_air() {
  if (!playerTurn) return;

  enemy.hp -= player.mag * 2;

  finish();
}

function lyra_fly() {
  if (!playerTurn) return;

  enemy.hp -= player.atk * 2;

  finish();
}

function lyra_shield() {
  if (!playerTurn) return;

  shield = true;

  document.getElementById("status").innerText =
    "Lyra ativou escudo de vento!";

  finish(false);
}

function lyra_ult() {
  if (!playerTurn) return;

  enemy.hp -= player.mag * 5;

  finish();
}

/* ======================
   FINAL
====================== */

function finish(skip=true){
  checkEnd();
  update();

  if (skip) endTurn();
  else {
    playerTurn = false;
    setTimeout(enemyTurn, 700);
  }
}

/* ======================
   CHECK
====================== */

function checkEnd() {

  if (enemy.hp <= 0) {
    alert("Você venceu!");
    location.reload();
  }

  if (player.hp <= 0) {
    alert("Você perdeu!");
    location.reload();
  }
}

/* ======================
   BOTÕES
====================== */

function render() {

  if (player.name === "Kael") {
    document.getElementById("actions").innerHTML = `
      <button onclick="kael_double()">Duplo Corte Flamejante</button>
      <button onclick="kael_smoke()">Bomba de Fumaça</button>
      <button onclick="kael_dash()">Investida Fatal</button>
      <button onclick="kael_ult()">Fatalidade em Chamas</button>
    `;
  }

  if (player.name === "Lyra") {
    document.getElementById("actions").innerHTML = `
      <button onclick="lyra_air()">Sopro de Ar</button>
      <button onclick="lyra_fly()">Voo Bravo</button>
      <button onclick="lyra_shield()">Proteção de Ventosa</button>
      <button onclick="lyra_ult()">Furacão 2000</button>
    `;
  }
}

</script>

</body>
</html>
