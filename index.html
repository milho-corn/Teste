<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG Estável</title>

<style>

body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f5f7fb;
  color: #222;
  text-align: center;
  margin: 0;
}

/* telas */
#menu, #game { display: none; }

#startScreen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
}

/* container */
.game-container {
  background: white;
  max-width: 420px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* personagens */
.character-grid {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin-top: 40px;
}

.card {
  width: 220px;
  border-radius: 16px;
  padding: 25px;
  cursor: pointer;
  background: white;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: 0.25s;
}

.card:hover { transform: translateY(-6px); }

/* barras */
.bar-container {
  width: 100%;
  border-radius: 12px;
  margin: 10px 0;
  overflow: hidden;
  background: #e9edf5;
  position: relative;
}

.enemy-box {
  margin-bottom: 25px; /* 🔥 espaço extra */
}

.bar { height: 24px; transition: 0.3s; }

.player { background: linear-gradient(90deg, #4caf50, #2e7d32); }
.enemy { background: linear-gradient(90deg, #ef5350, #c62828); }
#playerMana { background: linear-gradient(90deg, #42a5f5, #1565c0); }

.bar-label {
  position: absolute;
  width: 100%;
  top: 0;
  font-size: 13px;
  font-weight: 600;
}

/* ações */
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}

button {
  position: relative;
  padding: 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

button:disabled { opacity: 0.4; }

.ult {
  background: linear-gradient(135deg, #ffd700, #ffb300);
}

/* cooldown overlay */
.cooldown-fill {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 100%;
  background: rgba(0,0,0,0.2);
  transform-origin: left;
}

/* animações */
@keyframes hit {
  0% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-4px); }
  100% { transform: translateX(0); }
}
.hit { animation: hit 0.3s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade { animation: fadeUp 0.4s; }

#damageText {
  margin-top: 10px;
  color: orange;
  font-weight: bold;
}

</style>
</head>

<body>

<div id="startScreen">
  <h1>Mini RPG</h1>
  <button onclick="startGame()">START</button>
</div>

<div id="menu">
  <h2>Escolha</h2>
  <div class="character-grid">
    <div class="card" onclick="select('kael')">🔥 Kael</div>
    <div class="card" onclick="select('lyra')">🌪️ Lyra</div>
    <div class="card" onclick="select('dopamina')">✨ Dopamina</div>
  </div>
</div>

<div id="game">
  <div class="game-container">

    <h2 id="name"></h2>

    <div class="bar-container enemy-box" id="enemyBox">
      <div id="enemyHp" class="bar enemy"></div>
      <div class="bar-label" id="enemyLabel"></div>
    </div>

    <div class="bar-container">
      <div id="playerHp" class="bar player"></div>
      <div id="playerMana" class="bar"></div>
      <div class="bar-label" id="playerLabel"></div>
    </div>

    <p id="status"></p>
    <p id="damageText"></p>

    <div id="actions" class="actions"></div>

  </div>
</div>

<script>

let player = null;
let enemy = { hp: 100 };

let cooldown = {0:0,1:0,2:0,3:0};
const maxCooldown = {0:5,1:5,2:5,3:8};

const skills = {
  kael: [
    {name:"Dupla", dmg:2, cost:20},
    {name:"Fumaça", dmg:1, cost:25},
    {name:"Investida", dmg:2, cost:20},
    {name:"ULT", dmg:4, cost:50, ult:true}
  ],
  lyra: [
    {name:"Ar", dmg:1, cost:15},
    {name:"Voo", dmg:2, cost:20},
    {name:"Proteção", dmg:1, cost:30},
    {name:"ULT", dmg:5, cost:60, ult:true}
  ],
  dopamina: [
    {name:"Pisa", dmg:2, cost:10},
    {name:"Lacre", dmg:2, cost:15},
    {name:"Shantay", dmg:1, cost:25},
    {name:"ULT", dmg:6, cost:70, ult:true}
  ]
};

function startGame(){
  startScreen.style.display="none";
  menu.style.display="block";
}

function select(char){
  player = { id: char, name: char, hp: 100, mana: 100, maxMana:100, atk: 8 };
  enemy.hp = 100;
  cooldown = {0:0,1:0,2:0,3:0};
  menu.style.display="none";
  game.style.display="block";
  update();
}

/* regen mana + cooldown */
setInterval(()=>{
  if(player){
    player.mana = Math.min(player.maxMana, player.mana + 3);
    for(let k in cooldown){
      if(cooldown[k] > 0) cooldown[k]--;
    }
    render();
  }
},1000);

function update(){
  playerHp.style.width = player.hp+"%";
  playerMana.style.width = player.mana+"%";
  enemyHp.style.width = enemy.hp+"%";

  playerLabel.innerText = player.name + " HP:" + player.hp + " | Mana:" + player.mana;
  enemyLabel.innerText = "Inimigo ("+enemy.hp+"%)";

  render();
}

function render(){
  actions.innerHTML = skills[player.id].map((s,i)=>{

    let disabled = cooldown[i] > 0 || player.mana < s.cost;

    return `
      <button onclick="useSkill(${i})"
        ${disabled?"disabled":""}
        class="${s.ult?'ult':''}">
        
        <div class="cooldown-fill" style="transform:scaleX(${cooldown[i]/maxCooldown[i]})"></div>
        <span>${s.name} (${s.cost})</span>
      </button>
    `;
  }).join("");
}

function endGame(text){
  damageText.innerText = text;
  setTimeout(()=>{
    game.style.display="none";
    startScreen.style.display="flex";
  },1500);
}

function useSkill(i){

  let s = skills[player.id][i];
  if(cooldown[i] > 0 || player.mana < s.cost) return;

  player.mana -= s.cost;
  cooldown[i] = maxCooldown[i];

  let dmg = player.atk * s.dmg;
  enemy.hp -= dmg;

  enemyBox.classList.add("hit");
  setTimeout(()=>enemyBox.classList.remove("hit"),300);

  damageText.innerText = s.name + " causou " + dmg;
  damageText.classList.add("fade");

  if(enemy.hp <= 0){
    endGame("Você venceu!");
    return;
  }

  update();
  setTimeout(enemyTurn,800);
}

function enemyTurn(){

  let dmg = 8;
  player.hp -= dmg;

  playerHp.classList.add("hit");
  setTimeout(()=>playerHp.classList.remove("hit"),300);

  damageText.innerText = "Inimigo causou " + dmg;
  damageText.classList.add("fade");

  if(player.hp <= 0){
    endGame("Você perdeu!");
    return;
  }

  update();
}

</script>

</body>
</html>
