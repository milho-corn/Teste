<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG</title>

<style>
body {
  font-family: "Courier New", monospace;
  background: #fff;
  color: #111;
  text-align: center;
}

button {
  font-family: "Courier New", monospace;
  background: #f2f2f2;
  border: 2px solid #444;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

button:hover { background: #ddd; }

.hidden { display: none; }

.box {
  border: 2px solid #444;
  padding: 10px;
  margin: 10px;
  display: inline-block;
  width: 250px;
}

.bar-container {
  width: 300px;
  margin: 10px auto;
  border: 2px solid #444;
  background: #eee;
}

.bar {
  height: 18px;
  width: 100%;
  transition: 0.3s;
}

.playerBar { background: green; }
.enemyBar { background: red; }
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>🎮 Escolha seu personagem</h1>

  <div class="box">
    <h2>Kael 🔥</h2>
    <button onclick="select('kael')">Selecionar</button>
  </div>

  <div class="box">
    <h2>Lyra 🌪️</h2>
    <button onclick="select('lyra')">Selecionar</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <h1 id="name"></h1>

  <h3>Você</h3>
  <div class="bar-container">
    <div id="playerHp" class="bar playerBar"></div>
  </div>

  <h3>Inimigo</h3>
  <div class="bar-container">
    <div id="enemyHp" class="bar enemyBar"></div>
  </div>

  <p id="status"></p>

  <div id="actions"></div>
</div>

<script>

/* =========================
   ESTADO
========================= */

let player = {};
let enemy = { hp: 100 };

let playerTurn = true;

let kaelInvisible = false;
let lyraShield = false;

/* =========================
   SELEÇÃO
========================= */

function select(char) {

  if (char === "kael") {
    player = { name:"Kael", hp:100, atk:9, mag:4, speed:8 };
  }

  if (char === "lyra") {
    player = { name:"Lyra", hp:100, atk:5, mag:7, speed:9 };
  }

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  playerTurn = player.speed >= 6;

  start();
}

/* =========================
   INICIO
========================= */

function start() {
  document.getElementById("name").innerText = player.name;
  render();
  update();
}

/* =========================
   UI
========================= */

function clamp(v) {
  return Math.max(0, Math.min(100, v));
}

function update() {

  player.hp = clamp(player.hp);
  enemy.hp = clamp(enemy.hp);

  document.getElementById("playerHp").style.width = player.hp + "%";
  document.getElementById("enemyHp").style.width = enemy.hp + "%";

  document.getElementById("status").innerText =
    playerTurn ? "Sua vez ⚔️" : "Turno do inimigo 👾";
}

/* =========================
   TURNOS
========================= */

function endTurn() {
  playerTurn = false;
  update();

  setTimeout(enemyTurn, 600);
}

function enemyTurn() {

  if (kaelInvisible) {
    kaelInvisible = false;
    playerTurn = true;
    update();
    return;
  }

  let dmg = Math.floor(Math.random() * 10) + 5;

  if (lyraShield) {
    dmg = Math.floor(dmg / 2);
    lyraShield = false;
  }

  player.hp -= dmg;

  check();

  playerTurn = true;
  update();
}

/* =========================
   KAEL
========================= */

function kael_double() {
  if (!playerTurn) return;

  enemy.hp -= player.atk * 1.2;
  enemy.hp -= player.atk * 1.2;

  finish();
}

function kael_smoke() {
  if (!playerTurn) return;

  kaelInvisible = true;

  finish(false);
}

function kael_dash() {
  if (!playerTurn) return;

  enemy.hp -= player.atk * 2;

  finish();
}

function kael_ult() {
  if (!playerTurn) return;

  enemy.hp -= player.atk * 4;

  finish();
}

/* =========================
   LYRA
========================= */

function lyra_air() {
  if (!playerTurn) return;

  enemy.hp -= player.mag * 2;

  finish();
}

function lyra_fly() {
  if (!playerTurn) return;

  enemy.hp -= player.atk * 2;

  finish();
}

function lyra_shield() {
  if (!playerTurn) return;

  lyraShield = true;

  finish(false);
}

function lyra_ult() {
  if (!playerTurn) return;

  enemy.hp -= player.mag * 5;

  finish();
}

/* =========================
   FINALIZAÇÃO
========================= */

function finish(skip=true) {
  check();
  update();

  if (skip) endTurn();
  else {
    playerTurn = false;
    setTimeout(enemyTurn, 600);
  }
}

/* =========================
   CHECK
========================= */

function check() {

  if (enemy.hp <= 0) {
    alert("Você venceu!");
    location.reload();
  }

  if (player.hp <= 0) {
    alert("Você perdeu!");
    location.reload();
  }
}

/* =========================
   BOTÕES
========================= */

function render() {

  if (player.name === "Kael") {
    document.getElementById("actions").innerHTML = `
      <button onclick="kael_double()">Duplo Corte</button>
      <button onclick="kael_smoke()">Fumaça</button>
      <button onclick="kael_dash()">Investida</button>
      <button onclick="kael_ult()">Ultimate</button>
    `;
  }

  if (player.name === "Lyra") {
    document.getElementById("actions").innerHTML = `
      <button onclick="lyra_air()">Sopro de Ar</button>
      <button onclick="lyra_fly()">Voo Bravo</button>
      <button onclick="lyra_shield()">Proteção</button>
      <button onclick="lyra_ult()">Furacão 2000</button>
    `;
  }
}

</script>

</body>
</html>
