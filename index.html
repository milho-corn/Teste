<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG</title>

<style>
body {
  font-family: "Courier New", monospace;
  background: #111;
  color: #fff;
  text-align: center;
}

button {
  font-family: "Courier New", monospace;
  background: #222;
  color: #fff;
  border: 2px solid #555;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

button:hover {
  background: #333;
}

.box {
  border: 2px solid #444;
  padding: 15px;
  margin: 10px;
  display: inline-block;
  width: 250px;
}

.hidden {
  display: none;
}

/* BARRAS */
.bar-container {
  width: 300px;
  margin: 10px auto;
  border: 2px solid #444;
  background: #222;
}

.hp-bar {
  height: 18px;
  width: 100%;
  transition: 0.3s;
}

.player {
  background: linear-gradient(90deg, limegreen, green);
}

.enemy {
  background: linear-gradient(90deg, red, darkred);
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>🎮 Escolha seu personagem</h1>

  <div class="box">
    <h2>Kael 🔥</h2>
    <p>Assassino de fogo</p>
    <button onclick="selectChar('kael')">Selecionar</button>
  </div>

  <div class="box">
    <h2>Lyra 🌪️</h2>
    <p>Manipuladora de ar</p>
    <button onclick="selectChar('lyra')">Selecionar</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <h1 id="charName"></h1>

  <!-- PLAYER HP -->
  <h3>Seu HP</h3>
  <div class="bar-container">
    <div id="playerHpBar" class="hp-bar player"></div>
  </div>

  <!-- ENEMY HP -->
  <h3>Inimigo HP</h3>
  <div class="bar-container">
    <div id="enemyHpBar" class="hp-bar enemy"></div>
  </div>

  <p id="status"></p>

  <h3>Ações</h3>
  <div id="actions"></div>
</div>

<script>

let player = {};
let enemyHP = 100;

function selectChar(char) {

  if (char === "kael") {
    player = {
      name: "Kael",
      hp: 100,
      atk: 9,
      mag: 4,
      def: 5
    };
  }

  if (char === "lyra") {
    player = {
      name: "Lyra",
      hp: 100,
      atk: 5,
      mag: 7,
      def: 5
    };
  }

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  startGame();
}

function startGame() {
  document.getElementById("charName").innerText = player.name;
  updateUI();
  renderActions();
}

function updateUI() {

  document.getElementById("playerHpBar").style.width = player.hp + "%";
  document.getElementById("enemyHpBar").style.width = enemyHP + "%";

  document.getElementById("status").innerText =
    "Seu HP: " + player.hp + " | Inimigo HP: " + enemyHP;
}

function renderActions() {
  let html = "";

  if (player.name === "Kael") {
    html += `<button onclick="attack()">Investida Fatal</button>`;
    html += `<button onclick="smoke()">Bomba de Fumaça</button>`;
    html += `<button onclick="ultimateKael()">Fatalidade em Chamas</button>`;
  }

  if (player.name === "Lyra") {
    html += `<button onclick="windAttack()">Sopro de Ar</button>`;
    html += `<button onclick="defense()">Proteção de Ventosa</button>`;
    html += `<button onclick="ultimateLyra()">Furacão 2000</button>`;
  }

  document.getElementById("actions").innerHTML = html;
}

/* KAEL */
function attack() {
  enemyHP -= player.atk * 2;
  enemyTurn();
  updateUI();
}

function smoke() {
  document.getElementById("status").innerText = "Kael ficou invisível!";
}

function ultimateKael() {
  enemyHP -= player.atk * 4;
  enemyTurn();
  updateUI();
}

/* LYRA */
function windAttack() {
  enemyHP -= player.mag * 2;
  enemyTurn();
  updateUI();
}

function defense() {
  player.hp += 10;
  updateUI();
}

function ultimateLyra() {
  enemyHP -= player.mag * 5;
  enemyTurn();
  updateUI();
}

/* INIMIGO */
function enemyTurn() {
  let dmg = Math.floor(Math.random() * 10) + 5;
  player.hp -= dmg;

  if (player.hp <= 0) {
    alert("Você perdeu!");
    location.reload();
  }

  if (enemyHP <= 0) {
    alert("Você venceu!");
    location.reload();
  }
}

</script>

</body>
</html>
