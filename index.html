<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG</title>

<style>
body {
  font-family: "Courier New", monospace;
  background: #fff;
  color: #111;
  text-align: center;
}

button {
  font-family: "Courier New", monospace;
  background: #f2f2f2;
  border: 2px solid #444;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.box {
  border: 2px solid #444;
  padding: 10px;
  margin: 10px;
  display: inline-block;
  width: 250px;
}

.hidden { display: none; }

.bar-container {
  width: 300px;
  margin: 10px auto;
  border: 2px solid #444;
  background: #eee;
}

.hp-bar {
  height: 18px;
  width: 100%;
  transition: 0.3s;
}

.player { background: green; }
.enemy { background: red; }
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>🎮 Escolha seu personagem</h1>

  <div class="box">
    <h2>Kael 🔥</h2>
    <button onclick="selectChar('kael')">Selecionar</button>
  </div>

  <div class="box">
    <h2>Lyra 🌪️</h2>
    <button onclick="selectChar('lyra')">Selecionar</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <h1 id="charName"></h1>

  <h3>Seu HP</h3>
  <div class="bar-container">
    <div id="playerHpBar" class="hp-bar player"></div>
  </div>

  <h3>Inimigo HP</h3>
  <div class="bar-container">
    <div id="enemyHpBar" class="hp-bar enemy"></div>
  </div>

  <p id="status"></p>

  <div id="actions"></div>
</div>

<script>

let player = {};
let enemy = { hp: 100, speed: 6 };

let playerTurn = true;

/* ESCOLHA */
function selectChar(char) {

  if (char === "kael") {
    player = { name:"Kael", hp:100, atk:9, mag:4, speed:8 };
  }

  if (char === "lyra") {
    player = { name:"Lyra", hp:100, atk:5, mag:7, speed:9 };
  }

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  playerTurn = player.speed >= enemy.speed;

  startGame();
}

/* INICIO */
function startGame() {
  document.getElementById("charName").innerText = player.name;
  renderActions();
  updateUI();
}

/* UI */
function updateUI() {
  document.getElementById("playerHpBar").style.width = player.hp + "%";
  document.getElementById("enemyHpBar").style.width = enemy.hp + "%";

  document.getElementById("status").innerText =
    playerTurn ? "Sua vez ⚔️" : "Turno do inimigo 👾";
}

/* CONTROLE DE TURNO */
function endTurn() {
  playerTurn = false;
  updateUI();

  setTimeout(enemyTurn, 700);
}

/* INIMIGO */
function enemyTurn() {

  let dmg = Math.floor(Math.random() * 10) + 5;
  player.hp -= dmg;

  if (player.hp <= 0) {
    alert("Você perdeu!");
    location.reload();
  }

  if (enemy.hp <= 0) {
    alert("Você venceu!");
    location.reload();
  }

  playerTurn = true;
  updateUI();
}

/* AÇÕES */
function attack() {
  if (!playerTurn) return;

  enemy.hp -= player.atk * 2;

  checkEnd();
  updateUI();
  endTurn();
}

function ultimate() {
  if (!playerTurn) return;

  enemy.hp -= player.atk * 5;

  checkEnd();
  updateUI();
  endTurn();
}

/* CHECK */
function checkEnd() {
  if (enemy.hp <= 0) {
    alert("Você venceu!");
    location.reload();
  }
}

function renderActions() {
  document.getElementById("actions").innerHTML = `
    <button onclick="attack()">Ataque</button>
    <button onclick="ultimate()">Ultimate</button>
  `;
}

</script>

</body>
</html>
