<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PTT Battle</title>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #dfe9f3, #f5f7fb);
  margin: 0;
}

#game { display: none; }

.screen {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card-box {
  background: rgba(255,255,255,0.85);
  padding: 40px;
  border-radius: 25px;
  width: 90%;
  max-width: 500px;
  text-align: center;
}

.title {
  font-size: 36px;
  margin-bottom: 20px;
}

input {
  padding: 12px;
  width: 80%;
  border-radius: 10px;
  border: none;
  margin-bottom: 20px;
}

.start-btn {
  padding: 16px 35px;
  border-radius: 15px;
  border: none;
  cursor: pointer;
}

.game-container {
  background: rgba(255,255,255,0.9);
  width: 90%;
  max-width: 520px;
  padding: 30px;
  border-radius: 25px;
}

.bar-container {
  background: #e9edf5;
  border-radius: 12px;
  margin: 10px 0;
  overflow: hidden;
  position: relative;
}

.bar { height: 20px; }

.player { background: green; }
.enemy { background: red; }
.mana { background: blue; }
.xp { background: orange; }

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

button:disabled { opacity: 0.4; }

</style>
</head>

<body>

<div id="startScreen" class="screen">
  <div class="card-box">
    <div class="title">PTT Battle</div>
    <input id="playerName" placeholder="Digite seu nome">
    <br>
    <button class="start-btn" onclick="startGame()">START</button>
  </div>
</div>

<div id="game" class="screen">
  <div class="game-container">

    <div class="bar-container">
      <div id="enemyHp" class="bar enemy"></div>
    </div>

    <div class="bar-container">
      <div id="playerHp" class="bar player"></div>
    </div>

    <div class="bar-container">
      <div id="playerMana" class="bar mana"></div>
    </div>

    <div class="bar-container">
      <div id="playerXp" class="bar xp"></div>
    </div>

    <p id="playerLabel"></p>
    <p id="enemyLabel"></p>

    <p id="damageText"></p>
    <div id="actions" class="actions"></div>

  </div>
</div>

<script>

const startScreen = document.getElementById("startScreen");
const game = document.getElementById("game");

const playerHp = document.getElementById("playerHp");
const playerMana = document.getElementById("playerMana");
const playerXp = document.getElementById("playerXp");

const enemyHp = document.getElementById("enemyHp");

const playerLabel = document.getElementById("playerLabel");
const enemyLabel = document.getElementById("enemyLabel");

const actions = document.getElementById("actions");
const damageText = document.getElementById("damageText");

let player = null;
let enemy = {};

let cooldown = [];

const allSkills = [
  {name:"Soco", dmg:1, cost:0, cd:1, level:1},
  {name:"Corte", dmg:2, cost:20, cd:2, level:2},
  {name:"Explosão", dmg:3, cost:30, cd:3, level:3},
  {name:"Cura", heal:25, cost:25, cd:4, level:4},
  {name:"ULT", dmg:6, cost:60, cd:5, level:5}
];

/* 🔥 INIMIGO MAIS JUSTO */
function createEnemy(){
  enemy = {
    maxHp: 60 + player.level * 25,
    hp: 60 + player.level * 25
  };
}

function startGame(){

  let name = document.getElementById("playerName").value || "Herói";

  player = {
    name,
    hp:100,
    maxHp:100,
    mana:100,
    maxMana:100,
    atk:10, // 🔥 buff leve
    level:1,
    xp:0
  };

  createEnemy();

  startScreen.style.display="none";
  game.style.display="flex";

  update();
}

setInterval(()=>{
  if(player){
    player.mana = Math.min(player.maxMana, player.mana+3);
    cooldown = cooldown.map(c=>Math.max(0,c-1));
    render();
  }
},1000);

function gainXP(amount){
  player.xp += amount;

  let needed = player.level * 50;

  if(player.xp >= needed){
    player.xp -= needed;
    player.level++;
    player.maxHp += 10;
    player.maxMana += 10;
    player.atk += 2;

    damageText.innerText = "🔥 LEVEL UP!";
  }
}

function update(){

  playerHp.style.width = (player.hp/player.maxHp*100)+"%";
  playerMana.style.width = (player.mana/player.maxMana*100)+"%";
  playerXp.style.width = (player.xp/(player.level*50)*100)+"%";

  enemyHp.style.width = (enemy.hp/enemy.maxHp*100)+"%";

  playerLabel.innerText =
    player.name+" | Lv "+player.level+
    " | HP "+player.hp+
    " | Mana "+player.mana;

  enemyLabel.innerText = "Inimigo Lv "+player.level;

  render();
}

function render(){

  let list = allSkills.filter(s => player.level >= s.level);

  cooldown.length = list.length;
  for(let i=0;i<cooldown.length;i++){
    if(cooldown[i] === undefined) cooldown[i] = 0;
  }

  actions.innerHTML = list.map((s,i)=>{

    let cd = cooldown[i];
    let disabled = cd>0 || player.mana<s.cost;

    return `
      <button onclick="useSkill(${i})" ${disabled?"disabled":""}>
        ${s.name} (${s.cost}) ${cd>0 ? "[CD "+cd+"]":""}
      </button>
    `;
  }).join("");
}

function useSkill(i){

  let list = allSkills.filter(s => player.level >= s.level);
  let s = list[i];

  if(!s) return;
  if(cooldown[i]>0 || player.mana<s.cost) return;

  player.mana -= s.cost;
  cooldown[i] = s.cd;

  if(s.dmg){
    let dmg = s.dmg * player.atk;
    enemy.hp -= dmg;
    damageText.innerText = "💥 "+dmg+" dano";
  }

  if(s.heal){
    player.hp = Math.min(player.maxHp, player.hp + s.heal);
    damageText.innerText = "💚 +" + s.heal;
  }

  if(enemy.hp<=0){
    gainXP(25);
    createEnemy();
    update();
    return;
  }

  update();
  setTimeout(enemyTurn,700);
}

/* 🔥 DANO BALANCEADO */
function enemyTurn(){

  let dmg = Math.floor(3 + Math.random()*4 + player.level);

  player.hp -= dmg;

  damageText.innerText = "⚔️ "+dmg+" recebido";

  if(player.hp<=0){
    return endGame();
  }

  update();
}

function endGame(){
  damageText.innerText = "💀 Game Over";
  setTimeout(()=> location.reload(),1500);
}

</script>

</body>
</html>
