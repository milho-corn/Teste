<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PTT Battle</title>

<style>

body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #dfe9f3, #f5f7fb);
  margin: 0;
}

#menu, #game { display: none; }

.screen {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card-box {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 25px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.1);
  width: 90%;
  max-width: 500px;
  text-align: center;
}

.title {
  font-size: 36px;
  margin-bottom: 25px;
}

.start-btn {
  padding: 18px 40px;
  font-size: 18px;
  border-radius: 15px;
  border: none;
  cursor: pointer;
  background: white;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.start-btn:hover {
  transform: translateY(-3px);
}

.character-grid {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

.card {
  padding: 20px 25px;
  background: white;
  border-radius: 15px;
  cursor: pointer;
  font-size: 18px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

.game-container {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  width: 90%;
  max-width: 520px;
  padding: 30px;
  border-radius: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}

.bar-container {
  background: #e9edf5;
  border-radius: 12px;
  margin: 12px 0;
  overflow: hidden;
  position: relative;
}

.enemy-box {
  margin-bottom: 35px;
}

.bar {
  height: 22px;
}

.player { background: linear-gradient(90deg, #4caf50, #2e7d32); }
.enemy { background: linear-gradient(90deg, #ef5350, #c62828); }
#playerMana { background: linear-gradient(90deg, #42a5f5, #1565c0); }

.bar-label {
  position: absolute;
  width: 100%;
  font-size: 13px;
  top: 0;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 15px;
}

button {
  position: relative;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: white;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.15s;
}

button:active {
  transform: scale(0.95);
}

button:disabled {
  opacity: 0.4;
}

.cooldown-fill {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 100%;
  background: rgba(0,0,0,0.2);
  transform-origin: left;
}

/* animações */
.hit {
  animation: hit 0.3s;
}

@keyframes hit {
  0% { transform: translateX(0); }
  50% { transform: translateX(6px); }
  100% { transform: translateX(0); }
}

.fade {
  animation: fadeUp 0.4s;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}

/* 🔥 MELHORADO */
.flash {
  animation: flash 0.4s;
}

@keyframes flash {
  0% { filter: brightness(1); transform: scale(1); }
  50% { filter: brightness(2.5); transform: scale(1.05); }
  100% { filter: brightness(1); transform: scale(1); }
}

</style>
</head>

<body>

<div id="startScreen" class="screen">
  <div class="card-box">
    <div class="title">PTT Battle</div>
    <button class="start-btn" onclick="startGame()">START</button>
  </div>
</div>

<div id="menu" class="screen">
  <div class="card-box">
    <h2>Escolha o seu personagem</h2>

    <div class="character-grid">
      <div class="card" onclick="select('kael')">🔥 Kael</div>
      <div class="card" onclick="select('lyra')">🌪️ Lyra</div>
      <div class="card" onclick="select('dopamina')">✨ Dopamina</div>
    </div>
  </div>
</div>

<div id="game" class="screen">
  <div class="game-container">

    <div class="bar-container enemy-box" id="enemyBox">
      <div id="enemyHp" class="bar enemy"></div>
      <div class="bar-label" id="enemyLabel"></div>
    </div>

    <div class="bar-container" id="playerBox">
      <div id="playerHp" class="bar player"></div>
      <div id="playerMana" class="bar"></div>
      <div class="bar-label" id="playerLabel"></div>
    </div>

    <p id="damageText"></p>

    <div id="actions" class="actions"></div>

  </div>
</div>

<script>

let player = null;
let enemy = { hp:100 };

let cooldown = [0,0,0,0];
const maxCd = [5,5,5,8];

const skills = {
  kael: [
    {name:"Dupla", dmg:2, cost:20},
    {name:"Fumaça", dmg:1, cost:25},
    {name:"Investida", dmg:2, cost:20},
    {name:"ULT", dmg:4, cost:50}
  ],
  lyra: [
    {name:"Ar", dmg:1, cost:15},
    {name:"Voo", dmg:2, cost:20},
    {name:"Proteção", dmg:1, cost:30},
    {name:"ULT", dmg:5, cost:60}
  ],
  dopamina: [
    {name:"Pisa", dmg:2, cost:10},
    {name:"Lacre", dmg:2, cost:15},
    {name:"Shantay", dmg:1, cost:25},
    {name:"ULT", dmg:6, cost:70}
  ]
};

function startGame(){
  startScreen.style.display="none";
  menu.style.display="flex";
}

function select(char){
  player = { id:char, hp:100, mana:100, maxMana:100, atk:8 };
  enemy.hp = 100;
  cooldown = [0,0,0,0];

  menu.style.display="none";
  game.style.display="flex";

  update();
}

setInterval(()=>{
  if(player){
    player.mana = Math.min(player.maxMana, player.mana+3);
    cooldown = cooldown.map(c=>Math.max(0,c-1));
    render();
  }
},1000);

function update(){
  playerHp.style.width = player.hp+"%";
  playerMana.style.width = player.mana+"%";
  enemyHp.style.width = enemy.hp+"%";

  playerLabel.innerText = "HP:"+player.hp+" Mana:"+player.mana;
  enemyLabel.innerText = "Inimigo "+enemy.hp;

  render();
}

function render(){
  let list = skills[player.id] || [];

  actions.innerHTML = list.map((s,i)=>{
    let disabled = cooldown[i]>0 || player.mana<s.cost;

    return `
      <button onclick="useSkill(${i})" ${disabled?"disabled":""}>
        <div class="cooldown-fill" style="transform:scaleX(${cooldown[i]/maxCd[i]})"></div>
        ${s.name} (${s.cost})
      </button>
    `;
  }).join("");
}

function useSkill(i){

  let s = skills[player.id][i];
  if(cooldown[i]>0 || player.mana<s.cost) return;

  player.mana -= s.cost;
  cooldown[i] = maxCd[i];

  let dmg = s.dmg * player.atk;
  enemy.hp -= dmg;

  // 🔥 CORRIGIDO
  enemyBox.classList.remove("hit","flash");
  void enemyBox.offsetWidth;
  enemyBox.classList.add("hit","flash");

  damageText.innerText = "💥 Você causou "+dmg;
  damageText.classList.remove("fade");
  void damageText.offsetWidth;
  damageText.classList.add("fade");

  if(enemy.hp<=0){
    return endGame("🏆 Você venceu!");
  }

  update();
  setTimeout(enemyTurn,800);
}

function enemyTurn(){

  let dmg = 8;
  player.hp -= dmg;

  // 🔥 CORRIGIDO
  playerBox.classList.remove("hit","flash");
  void playerBox.offsetWidth;
  playerBox.classList.add("hit","flash");

  damageText.innerText = "⚔️ Inimigo causou "+dmg;
  damageText.classList.remove("fade");
  void damageText.offsetWidth;
  damageText.classList.add("fade");

  if(player.hp<=0){
    return endGame("💀 Você perdeu!");
  }

  update();
}

function endGame(text){
  damageText.innerText = text;
  setTimeout(()=>{
    game.style.display="none";
    startScreen.style.display="flex";
  },1500);
}

</script>

</body>
</html>
