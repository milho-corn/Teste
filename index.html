<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG</title>

<style>

body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  margin: 0;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* telas */
#menu, #game { display: none; width: 100%; }

#startScreen {
  text-align: center;
}

/* container */
.game-container {
  background: white;
  width: 90%;
  max-width: 600px;
  padding: 40px;
  border-radius: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.1);
}

/* personagens */
.character-grid {
  display: flex;
  justify-content: center;
  gap: 25px;
}

.card {
  padding: 25px;
  border-radius: 16px;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

/* barras */
.bar-container {
  background: #e9edf5;
  border-radius: 12px;
  margin: 15px 0;
  height: 28px;
  overflow: hidden;
  position: relative;
}

.enemy-box {
  margin-bottom: 35px;
}

.bar {
  height: 100%;
  position: relative;
  overflow: hidden;
}

/* brilho animado */
.bar::after {
  content: "";
  position: absolute;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: shine 2s infinite;
}

@keyframes shine {
  from { left: -50%; }
  to { left: 100%; }
}

.player { background: linear-gradient(90deg, #4caf50, #2e7d32); }
.enemy { background: linear-gradient(90deg, #ef5350, #c62828); }
#playerMana { background: linear-gradient(90deg, #42a5f5, #1565c0); }

.bar-label {
  position: absolute;
  width: 100%;
  font-size: 14px;
  top: 0;
  line-height: 28px;
  font-weight: bold;
}

/* botões */
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-top: 20px;
}

button {
  position: relative;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: white;
  cursor: pointer;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  transition: 0.2s;
}

button:hover {
  transform: translateY(-3px);
}

button:active {
  transform: scale(0.95);
}

button:disabled {
  opacity: 0.4;
}

/* cooldown */
.cooldown-fill {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 100%;
  background: rgba(0,0,0,0.2);
  transform-origin: left;
}

/* animações */
.hit {
  animation: hit 0.3s;
}

@keyframes hit {
  0% { transform: translateX(0); }
  50% { transform: translateX(8px); }
  100% { transform: translateX(0); }
}

.fade {
  animation: fadeUp 0.4s;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}

/* impacto skill */
.impact {
  animation: impact 0.4s;
}

@keyframes impact {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

#damageText {
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
}

</style>
</head>

<body>

<div id="startScreen">
  <h1>Mini RPG</h1>
  <button onclick="startGame()">START</button>
</div>

<div id="menu">
  <h2>Escolha</h2>
  <div class="character-grid">
    <div class="card" onclick="select('kael')">🔥 Kael</div>
    <div class="card" onclick="select('lyra')">🌪️ Lyra</div>
    <div class="card" onclick="select('dopamina')">✨ Dopamina</div>
  </div>
</div>

<div id="game">
  <div class="game-container">

    <h2 id="name"></h2>

    <div class="bar-container enemy-box" id="enemyBox">
      <div id="enemyHp" class="bar enemy"></div>
      <div class="bar-label" id="enemyLabel"></div>
    </div>

    <div class="bar-container">
      <div id="playerHp" class="bar player"></div>
      <div id="playerMana" class="bar"></div>
      <div class="bar-label" id="playerLabel"></div>
    </div>

    <p id="damageText"></p>

    <div id="actions" class="actions"></div>

  </div>
</div>

<script>

let player = null;
let enemy = { hp:100 };

let cooldown = [0,0,0,0];
const maxCd = [5,5,5,8];

const skills = {
  kael: [
    {name:"Dupla", dmg:2, cost:20},
    {name:"Fumaça", dmg:1, cost:25},
    {name:"Investida", dmg:2, cost:20},
    {name:"ULT", dmg:4, cost:50}
  ],
  lyra: [
    {name:"Ar", dmg:1, cost:15},
    {name:"Voo", dmg:2, cost:20},
    {name:"Proteção", dmg:1, cost:30},
    {name:"ULT", dmg:5, cost:60}
  ],
  dopamina: [
    {name:"Pisa", dmg:2, cost:10},
    {name:"Lacre", dmg:2, cost:15},
    {name:"Shantay", dmg:1, cost:25},
    {name:"ULT", dmg:6, cost:70}
  ]
};

function startGame(){
  startScreen.style.display="none";
  menu.style.display="block";
}

function select(char){
  player = { id:char, hp:100, mana:100, maxMana:100, atk:8 };
  enemy.hp = 100;
  cooldown = [0,0,0,0];
  menu.style.display="none";
  game.style.display="block";
  update();
}

/* regen */
setInterval(()=>{
  if(player){
    player.mana = Math.min(player.maxMana, player.mana+3);
    cooldown = cooldown.map(c=>Math.max(0,c-1));
    render();
  }
},1000);

function update(){
  playerHp.style.width = player.hp+"%";
  playerMana.style.width = player.mana+"%";
  enemyHp.style.width = enemy.hp+"%";

  playerLabel.innerText = "HP:"+player.hp+" Mana:"+player.mana;
  enemyLabel.innerText = "Inimigo "+enemy.hp;

  render();
}

function render(){

  let list = skills[player.id] || [];

  actions.innerHTML = list.map((s,i)=>{

    let disabled = cooldown[i]>0 || player.mana<s.cost;

    return `
      <button onclick="useSkill(${i})" ${disabled?"disabled":""}>
        <div class="cooldown-fill" style="transform:scaleX(${cooldown[i]/maxCd[i]})"></div>
        ${s.name} (${s.cost})
      </button>
    `;
  }).join("");
}

function useSkill(i){

  let s = skills[player.id][i];
  if(cooldown[i]>0 || player.mana<s.cost) return;

  player.mana -= s.cost;
  cooldown[i] = maxCd[i];

  let dmg = s.dmg * player.atk;
  enemy.hp -= dmg;

  enemyBox.classList.add("hit","impact");
  setTimeout(()=>enemyBox.classList.remove("hit","impact"),300);

  damageText.innerText = "Você causou "+dmg;
  damageText.classList.remove("fade");
  void damageText.offsetWidth;
  damageText.classList.add("fade");

  if(enemy.hp<=0){
    return endGame("Você venceu!");
  }

  update();
  setTimeout(enemyTurn,800);
}

function enemyTurn(){

  let dmg = 8;
  player.hp -= dmg;

  playerHp.classList.add("hit");
  setTimeout(()=>playerHp.classList.remove("hit"),300);

  damageText.innerText = "Inimigo causou "+dmg;

  if(player.hp<=0){
    return endGame("Você perdeu!");
  }

  update();
}

function endGame(text){
  damageText.innerText = text;
  setTimeout(()=>{
    game.style.display="none";
    startScreen.style.display="flex";
  },1500);
}

</script>

</body>
</html>
