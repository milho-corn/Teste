<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PTT Battle</title>

<style>

body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #dfe9f3, #f5f7fb);
  margin: 0;
}

/* telas */
#game { display: none; }

.screen {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* card */
.card-box {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 25px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.1);
  width: 90%;
  max-width: 500px;
  text-align: center;
}

.title {
  font-size: 36px;
  margin-bottom: 20px;
}

/* input nome */
input {
  padding: 12px;
  width: 80%;
  border-radius: 10px;
  border: none;
  margin-bottom: 20px;
}

/* botão */
.start-btn {
  padding: 16px 35px;
  font-size: 18px;
  border-radius: 15px;
  border: none;
  cursor: pointer;
  background: white;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

/* batalha */
.game-container {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  width: 90%;
  max-width: 520px;
  padding: 30px;
  border-radius: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}

/* barras */
.bar-container {
  background: #e9edf5;
  border-radius: 12px;
  margin: 12px 0;
  overflow: hidden;
  position: relative;
}

.enemy-box {
  margin-bottom: 35px;
}

.bar {
  height: 22px;
}

.player { background: linear-gradient(90deg, #4caf50, #2e7d32); }
.enemy { background: linear-gradient(90deg, #ef5350, #c62828); }
#playerMana { background: linear-gradient(90deg, #42a5f5, #1565c0); }

.bar-label {
  position: absolute;
  width: 100%;
  font-size: 13px;
  top: 0;
}

/* botões */
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 15px;
}

button {
  position: relative;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: white;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

button:disabled {
  opacity: 0.4;
}

/* cooldown */
.cooldown-fill {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 100%;
  background: rgba(0,0,0,0.2);
  transform-origin: left;
}

/* animações */
.hit {
  animation: hit 0.3s;
}
@keyframes hit {
  50% { transform: translateX(6px); }
}

.fade {
  animation: fadeUp 0.4s;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; }
}

.flash {
  animation: flash 0.4s;
}
@keyframes flash {
  50% { filter: brightness(2.5); transform: scale(1.05); }
}

</style>
</head>

<body>

<!-- START -->
<div id="startScreen" class="screen">
  <div class="card-box">
    <div class="title">PTT Battle</div>

    <input id="playerName" placeholder="Digite seu nome">

    <br>
    <button class="start-btn" onclick="startGame()">START</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="game-container">

    <div class="bar-container enemy-box" id="enemyBox">
      <div id="enemyHp" class="bar enemy"></div>
      <div class="bar-label" id="enemyLabel"></div>
    </div>

    <div class="bar-container" id="playerBox">
      <div id="playerHp" class="bar player"></div>
      <div id="playerMana" class="bar"></div>
      <div class="bar-label" id="playerLabel"></div>
    </div>

    <p id="damageText"></p>

    <div id="actions" class="actions"></div>

  </div>
</div>

<script>

let player = null;
let enemy = { hp:100 };

let cooldown = [0,0,0,0];
const maxCd = [2,4,6,8];

/* 🔥 SKILLS COM LEVEL */
const allSkills = [
  {name:"Soco", dmg:1, cost:0, level:1},
  {name:"Corte", dmg:2, cost:20, level:2},
  {name:"Explosão", dmg:3, cost:30, level:3},
  {name:"ULT", dmg:5, cost:60, level:5}
];

function startGame(){

  let name = document.getElementById("playerName").value || "Herói";

  player = {
    name,
    hp:100,
    mana:100,
    maxMana:100,
    atk:8,
    level:1,
    xp:0
  };

  startScreen.style.display="none";
  game.style.display="flex";

  update();
}

/* regen */
setInterval(()=>{
  if(player){
    player.mana = Math.min(player.maxMana, player.mana+3);
    cooldown = cooldown.map(c=>Math.max(0,c-1));
    render();
  }
},1000);

/* XP */
function gainXP(amount){
  player.xp += amount;

  if(player.xp >= player.level * 50){
    player.xp = 0;
    player.level++;
    player.maxMana += 10;
    player.atk += 2;

    damageText.innerText = "🔥 LEVEL UP! Lv " + player.level;
  }
}

function update(){
  playerHp.style.width = player.hp+"%";
  playerMana.style.width = player.mana+"%";
  enemyHp.style.width = enemy.hp+"%";

  playerLabel.innerText =
    player.name+" | Lv:"+player.level+
    " HP:"+player.hp+
    " Mana:"+player.mana+
    " XP:"+player.xp;

  enemyLabel.innerText = "Inimigo "+enemy.hp;

  render();
}

function render(){

  let list = allSkills.filter(s => player.level >= s.level);

  actions.innerHTML = list.map((s,i)=>{

    let disabled = cooldown[i]>0 || player.mana<s.cost;

    return `
      <button onclick="useSkill(${i})" ${disabled?"disabled":""}>
        <div class="cooldown-fill" style="transform:scaleX(${cooldown[i]/maxCd[i]})"></div>
        ${s.name} (${s.cost})
      </button>
    `;
  }).join("");
}

function useSkill(i){

  let list = allSkills.filter(s => player.level >= s.level);
  let s = list[i];

  if(cooldown[i]>0 || player.mana<s.cost) return;

  player.mana -= s.cost;
  cooldown[i] = maxCd[i];

  let dmg = s.dmg * player.atk;
  enemy.hp -= dmg;

  enemyBox.classList.remove("hit","flash");
  void enemyBox.offsetWidth;
  enemyBox.classList.add("hit","flash");

  damageText.innerText = "💥 "+dmg+" dano";
  damageText.classList.remove("fade");
  void damageText.offsetWidth;
  damageText.classList.add("fade");

  if(enemy.hp<=0){
    gainXP(20);
    enemy.hp = 100;
    update();
    return;
  }

  update();
  setTimeout(enemyTurn,800);
}

function enemyTurn(){

  let dmg = 8;
  player.hp -= dmg;

  playerBox.classList.remove("hit","flash");
  void playerBox.offsetWidth;
  playerBox.classList.add("hit","flash");

  damageText.innerText = "⚔️ "+dmg+" recebido";

  if(player.hp<=0){
    return endGame("💀 Game Over");
  }

  update();
}

function endGame(text){
  damageText.innerText = text;
  setTimeout(()=>{
    location.reload();
  },1500);
}

</script>

</body>
</html>
