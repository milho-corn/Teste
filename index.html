<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG Estável</title><style>
body {
  font-family: "Courier New", monospace;
  background: #fff;
  text-align: center;
}

#startScreen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
}

#menu { display: none; }
#game { display: none; }

.character-grid {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.card {
  width: 180px;
  border: 3px solid #444;
  padding: 15px;
  cursor: pointer;
}

button {
  padding: 10px;
  margin: 5px;
  border: 2px solid #444;
  cursor: pointer;
}

button:disabled {
  opacity: 0.4;
}

.bar-container {
  width: 300px;
  border: 2px solid #444;
  margin: 10px auto;
}

.bar {
  height: 18px;
}

.player { background: green; }
.enemy { background: red; }
</style></head><body><div id="startScreen">
  <h1>Mini RPG</h1>
  <button onclick="startGame()">START</button>
</div><div id="menu">
  <h2>Escolha</h2>
  <div class="character-grid">
    <div class="card" onclick="select('kael')">🔥 Kael</div>
    <div class="card" onclick="select('lyra')">🌪️ Lyra</div>
    <div class="card" onclick="select('dopamina')">✨ Dopamina</div>
  </div>
</div><div id="game">
  <h2 id="name"></h2>  <div class="bar-container">
    <div id="playerHp" class="bar player"></div>
  </div>  <div class="bar-container">
    <div id="enemyHp" class="bar enemy"></div>
  </div>  <p id="status"></p>
  <p id="damageText"></p>
  <div id="actions"></div>
</div><script>

let player = {};
let enemy = { hp: 100 };

let playerTurn = true;
let round = 1;
let gameOver = false;

let shield = false;
let skipEnemyTurn = false;

let cooldown = { double:0, smoke:0, dash:0, ult:0 };

function startGame(){
  startScreen.style.display="none";
  menu.style.display="block";
}

function select(char){

  if(char==="kael") player={name:"Kael",hp:100,atk:9,mag:4};
  if(char==="lyra") player={name:"Lyra",hp:100,atk:5,mag:7};
  if(char==="dopamina") player={name:"Dopamina",hp:100,atk:8,mag:8};

  menu.style.display="none";
  game.style.display="block";

  update();
}

function clamp(v){ return Math.max(0,Math.min(100,v)); }
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

function update(){

  player.hp = clamp(player.hp);
  enemy.hp = clamp(enemy.hp);

  playerHp.style.width = player.hp+"%";
  enemyHp.style.width = enemy.hp+"%";

  status.innerText = `Rodada ${round} | ${playerTurn?"Sua vez":"Inimigo"}`;

  for(let k in cooldown){
    if(cooldown[k]>0) cooldown[k]--;
  }

  render();
}

function endTurn(){
  playerTurn=false;
  update();
  setTimeout(enemyTurn,1200);
}

async function enemyTurn(){

  if(skipEnemyTurn){
    skipEnemyTurn=false;
    round++;
    playerTurn=true;
    update();
    return;
  }

  let dmg = Math.floor(Math.random()*10)+5;

  if(shield){
    dmg = Math.floor(dmg*0.5);
    shield=false;
  }

  player.hp -= dmg;
  damageText.innerText = "Inimigo: "+dmg;

  await delay(1200);

  round++;
  playerTurn=true;
  update();
}

/* ===== KAEL ===== */
function kael_double(){
  if(!playerTurn || cooldown.double) return;
  cooldown.double=2;
  enemy.hp -= player.atk*2;
  damageText.innerText="Dupla flamejante";
  endTurn();
}

function kael_smoke(){
  if(!playerTurn || cooldown.smoke) return;
  cooldown.smoke=3;
  skipEnemyTurn=true;
  damageText.innerText="Fumaça";
  endTurn();
}

function kael_dash(){
  if(!playerTurn || cooldown.dash) return;
  cooldown.dash=2;
  enemy.hp -= player.atk*2;
  damageText.innerText="Investida";
  endTurn();
}

function kael_ult(){
  if(!playerTurn || round<3 || cooldown.ult) return;
  cooldown.ult=5;
  enemy.hp -= player.atk*4;
  damageText.innerText="FATALIDADE";
  endTurn();
}

/* ===== LYRA ===== */
function lyra_air(){
  if(!playerTurn || cooldown.double) return;
  cooldown.double=2;
  enemy.hp -= player.mag*2;
  damageText.innerText="Sopro de ar";
  endTurn();
}

function lyra_fly(){
  if(!playerTurn || cooldown.dash) return;
  cooldown.dash=2;
  enemy.hp -= player.atk*2;
  damageText.innerText="Voo bravo";
  endTurn();
}

function lyra_shield(){
  if(!playerTurn || cooldown.smoke) return;
  cooldown.smoke=3;
  shield=true;
  damageText.innerText="Proteção";
  endTurn();
}

function lyra_ult(){
  if(!playerTurn || round<3 || cooldown.ult) return;
  cooldown.ult=5;
  enemy.hp -= player.mag*5;
  damageText.innerText="Furacão";
  endTurn();
}

/* ===== DOPAMINA ===== */
function dopamina_pisa(){
  if(!playerTurn || cooldown.double) return;
  cooldown.double=2;
  enemy.hp -= player.atk*2;
  damageText.innerText="Pisa menos!";
  endTurn();
}

function dopamina_lacre(){
  if(!playerTurn || cooldown.dash) return;
  cooldown.dash=2;
  enemy.hp -= player.mag*2;
  damageText.innerText="Lacre agudo";
  endTurn();
}

function dopamina_shantay(){
  if(!playerTurn || cooldown.smoke) return;
  cooldown.smoke=3;
  shield=true;
  damageText.innerText="Shantay!";
  endTurn();
}

function dopamina_ult(){
  if(!playerTurn || round<3 || cooldown.ult) return;
  cooldown.ult=5;
  enemy.hp -= player.mag*6;
  damageText.innerText="Sashay away!";
  endTurn();
}

function render(){

  let ultReady = round>=3 && cooldown.ult===0;

  if(player.name==="Kael"){
    actions.innerHTML=`
    <button onclick="kael_double()">Dupla</button>
    <button onclick="kael_smoke()">Fumaça</button>
    <button onclick="kael_dash()">Investida</button>
    <button onclick="kael_ult()" ${!ultReady?"disabled":""}>ULT</button>`;
  }

  if(player.name==="Lyra"){
    actions.innerHTML=`
    <button onclick="lyra_air()">Ar</button>
    <button onclick="lyra_fly()">Voo</button>
    <button onclick="lyra_shield()">Proteção</button>
    <button onclick="lyra_ult()" ${!ultReady?"disabled":""}>ULT</button>`;
  }

  if(player.name==="Dopamina"){
    actions.innerHTML=`
    <button onclick="dopamina_pisa()">Pisa</button>
    <button onclick="dopamina_lacre()">Lacre</button>
    <button onclick="dopamina_shantay()">Shantay</button>
    <button onclick="dopamina_ult()" ${!ultReady?"disabled":""}>ULT</button>`;
  }
}

</script></body>
</html>
