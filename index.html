<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG</title>

<style>
body {
  font-family: "Courier New", monospace;
  background: #fff;
  color: #111;
  text-align: center;
}

button {
  font-family: "Courier New", monospace;
  background: #f2f2f2;
  border: 2px solid #444;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

button:hover { background: #ddd; }

.hidden { display: none; }

.box {
  border: 2px solid #444;
  padding: 10px;
  margin: 10px;
  display: inline-block;
  width: 250px;
}

.bar-container {
  width: 300px;
  margin: 10px auto;
  border: 2px solid #444;
  background: #eee;
}

.bar {
  height: 18px;
  width: 100%;
  transition: 0.3s;
}

.playerBar { background: green; }
.enemyBar { background: red; }
</style>
</head>

<div id="menu">

  </div>

  <div class="box">

    <button onclick="select('lyra')">Selecionar</button>
  </div>
</div>

<div id="game" class="hidden">
  <h1 id="name"></h1>

  <h3>Você</h3>
  <div class="bar-container">

  </div>

  <h3>Inimigo</h3>
  <div class="bar-container">
    <div id="enemyHp" class="bar enemyBar"></div>
  </div>

  <p id="status"></p>

  <div id="actions"></div>
</div>
