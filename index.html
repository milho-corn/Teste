<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG Estável</title>

<style>
body {
  font-family: "Courier New", monospace;
  background: #fff;
  text-align: center;
}

#startScreen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
}

#startScreen button {
  padding: 15px 25px;
  font-size: 18px;
  cursor: pointer;
  border: 2px solid #444;
  background: #eee;
}

#menu { display: none; }

.character-grid {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.card {
  width: 180px;
  border: 3px solid #444;
  padding: 15px;
  cursor: pointer;
  background: #f5f5f5;
}

#game { display: none; }

button {
  padding: 10px;
  margin: 5px;
  border: 2px solid #444;
  background: #eee;
  cursor: pointer;
}

button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.bar-container {
  width: 300px;
  border: 2px solid #444;
  margin: 10px auto;
  background: #ddd;
}

.bar {
  height: 18px;
  transition: 0.3s;
}

.player { background: green; }
.enemy { background: red; }

#damageText {
  height: 20px;
  margin: 10px;
  font-weight: bold;
  color: #b30000;
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>Mini RPG</h1>
  <button onclick="startGame()">START THE GAME</button>
</div>

<div id="menu">
  <h2>Escolha seu personagem</h2>

  <div class="character-grid">
    <div class="card" onclick="select('kael')">
      <h3>🔥 Kael</h3>
    </div>

    <div class="card" onclick="select('lyra')">
      <h3>🌪️ Lyra</h3>
    </div>
  </div>
</div>

<div id="game">
  <h2 id="name"></h2>

  <div class="bar-container">
    <div id="playerHp" class="bar player"></div>
  </div>

  <div class="bar-container">
    <div id="enemyHp" class="bar enemy"></div>
  </div>

  <p id="status"></p>
  <p id="damageText"></p>

  <div id="actions"></div>
</div>

<script>

/* ======================
   START
====================== */
function startGame() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("menu").style.display = "block";
}

/* ======================
   STATE
====================== */
let player = {};
let enemy = { hp: 100 };

let playerTurn = true;
let round = 1;
let gameOver = false;

let shield = false;
let acting = false;

/* cooldowns */
let cooldown = {
  double: 0,
  smoke: 0,
  dash: 0,
  ult: 0
};

/* ======================
   SELECT
====================== */
function select(char) {
  player = (char === "kael")
    ? { name:"Kael", hp:100, atk:9, mag:4 }
    : { name:"Lyra", hp:100, atk:5, mag:7 };

  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  start();
}

function start() {
  document.getElementById("name").innerText = player.name;
  update();
  render();
}

/* ======================
   HELPERS
====================== */
function clamp(v){
  return Math.max(0, Math.min(100, v));
}

function delay(ms){
  return new Promise(r => setTimeout(r, ms));
}

function showDamage(t){
  document.getElementById("damageText").innerText = t;
}

/* ======================
   GAME OVER
====================== */
function checkGameOver() {
  if (enemy.hp <= 0) {
    gameOver = true;
    enemy.hp = 0;
    update();
    setTimeout(() => alert("Você venceu!"), 300);
  }

  if (player.hp <= 0) {
    gameOver = true;
    player.hp = 0;
    update();
    setTimeout(() => alert("Você perdeu!"), 300);
  }
}

/* ======================
   COOLDOWN
====================== */
function tickCooldowns(){
  for (let k in cooldown){
    if (cooldown[k] > 0) cooldown[k]--;
  }
}

/* ======================
   UPDATE
====================== */
function update() {

  if (gameOver) return;

  player.hp = clamp(player.hp);
  enemy.hp = clamp(enemy.hp);

  document.getElementById("playerHp").style.width = player.hp + "%";
  document.getElementById("enemyHp").style.width = enemy.hp + "%";

  document.getElementById("status").innerText =
    `Rodada ${round} | ${playerTurn ? "Sua vez ⚔️" : "Inimigo..."}`;

  tickCooldowns();
  render();
}

/* ======================
   TURN SYSTEM
====================== */
function endTurn() {
  playerTurn = false;
  update();

  setTimeout(enemyTurn, 1400);
}

/* inimigo */
async function enemyTurn() {

  if (gameOver) return;

  let dmg = Math.floor(Math.random() * 10) + 5;

  if (shield) {
    dmg = Math.floor(dmg * 0.5);
    shield = false;
  }

  player.hp -= dmg;

  showDamage(`Inimigo causou ${dmg}`);
  checkGameOver();

  await delay(1400);

  round++;
  playerTurn = true;
  update();
}

/* trava ação */
function canAct(cd){
  return playerTurn && !gameOver && !acting && cooldown[cd] === 0;
}

/* ======================
   KAEL
====================== */
async function kael_double() {
  if (!canAct("double")) return;

  acting = true;
  cooldown.double = 2;

  let dmg = Math.floor(player.atk * 1.4);
  enemy.hp -= dmg;

  showDamage(`Kael causou ${dmg}`);
  update();

  await delay(1500);

  acting = false;
  endTurn();
}

async function kael_smoke() {
  if (!canAct("smoke")) return;

  acting = true;
  cooldown.smoke = 3;
  skipEnemyTurn = true;

  showDamage("Kael usou fumaça!");
  update();

  await delay(1500);

  acting = false;
  endTurn();
}

async function kael_dash() {
  if (!canAct("dash")) return;

  acting = true;
  cooldown.dash = 2;

  let dmg = player.atk * 2;
  enemy.hp -= dmg;

  showDamage(`Kael causou ${dmg}`);
  update();

  await delay(1500);

  acting = false;
  endTurn();
}

async function kael_ult() {
  if (!playerTurn || round < 3 || cooldown.ult > 0 || acting) return;

  acting = true;
  cooldown.ult = 5;

  let dmg = player.atk * 4;
  enemy.hp -= dmg;

  showDamage(`ULTIMATE! ${dmg}`);
  update();

  await delay(1800);

  acting = false;
  endTurn();
}

/* ======================
   LYRA
====================== */
async function lyra_air() {
  if (!canAct("double")) return;

  acting = true;
  cooldown.double = 2;

  let dmg = player.mag * 2;
  enemy.hp -= dmg;

  showDamage(`Lyra causou ${dmg}`);
  update();

  await delay(1500);

  acting = false;
  endTurn();
}

async function lyra_fly() {
  if (!canAct("dash")) return;

  acting = true;
  cooldown.dash = 2;

  let dmg = player.atk * 2;
  enemy.hp -= dmg;

  showDamage(`Lyra atacou ${dmg}`);
  update();

  await delay(1500);

  acting = false;
  endTurn();
}

async function lyra_shield() {
  if (!canAct("smoke")) return;

  acting = true;
  cooldown.smoke = 3;
  shield = true;

  showDamage("Lyra ativou proteção");
  update();

  await delay(1500);

  acting = false;
  endTurn();
}

async function lyra_ult() {
  if (!playerTurn || round < 3 || cooldown.ult > 0 || acting) return;

  acting = true;
  cooldown.ult = 5;

  let dmg = player.mag * 5;
  enemy.hp -= dmg;

  showDamage(`FURACÃO! ${dmg}`);
  update();

  await delay(1800);

  acting = false;
  endTurn();
}

/* ======================
   RENDER BUTTONS
====================== */
function render() {

  let ultReady = round >= 3 && cooldown.ult === 0;

  document.getElementById("actions").innerHTML = `
    <button onclick="kael_double()" ${cooldown.double? "disabled":""}>Duplo</button>
    <button onclick="kael_smoke()" ${cooldown.smoke? "disabled":""}>Fumaça</button>
    <button onclick="kael_dash()" ${cooldown.dash? "disabled":""}>Dash</button>
    <button onclick="kael_ult()" ${!ultReady? "disabled":""}>ULT</button>
  `;
}

</script>

</body>
</html>
