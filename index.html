<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG Estável</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #fff;
  text-align: center;
}

/* TELAS */
#menu, #game { display: none; }

#startScreen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
}

/* PERSONAGENS */
.character-grid {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 40px;
}

.card {
  width: 220px;
  border: 3px solid #444;
  padding: 25px;
  cursor: pointer;
  font-size: 20px;
}

/* BOTÕES */
button {
  position: relative;
  padding: 20px 25px;
  margin: 10px;
  border: 2px solid #444;
  cursor: pointer;
  font-size: 16px;
  min-width: 180px;
  overflow: hidden;
  background: white;
}

/* ULT dourado */
.ult {
  border-color: gold;
  color: #b8860b;
  font-weight: bold;
}

/* COOLDOWN overlay */
.cooldown-bar {
  position: absolute;
  left: 0;
  bottom: 0;
  height: 100%;
  width: 100%;
  background: rgba(150,150,150,0.6);
  transform-origin: left;
  transform: scaleX(1);
  transition: transform 0.3s linear;
  pointer-events: none;
}

button span {
  position: relative;
  z-index: 2;
}

/* BARRAS */
.bar-container {
  width: 340px;
  border: 2px solid #444;
  margin: 10px auto;
  position: relative;
}

.bar {
  height: 24px;
  transition: 0.3s;
}

.player { background: green; }
.enemy { background: red; }

.bar-label {
  position: absolute;
  width: 100%;
  top: 0;
  left: 0;
  font-size: 14px;
  color: white;
  font-weight: bold;
  text-shadow: 1px 1px 2px black;
}

#damageText {
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>Mini RPG</h1>
  <button onclick="startGame()">START</button>
</div>

<div id="menu">
  <h2>Escolha</h2>
  <div class="character-grid">
    <div class="card" onclick="select('kael')">🔥 Kael</div>
    <div class="card" onclick="select('lyra')">🌪️ Lyra</div>
    <div class="card" onclick="select('dopamina')">✨ Dopamina</div>
  </div>
</div>

<div id="game">
  <h2 id="name"></h2>

  <div class="bar-container">
    <div id="playerHp" class="bar player"></div>
    <div class="bar-label" id="playerLabel"></div>
  </div>

  <div class="bar-container">
    <div id="enemyHp" class="bar enemy"></div>
    <div class="bar-label" id="enemyLabel"></div>
  </div>

  <p id="status"></p>
  <p id="damageText"></p>

  <div id="actions"></div>
</div>

<script>

let player = {};
let enemy = { hp: 100 };

let playerTurn = true;
let round = 1;
let gameOver = false;

let shield = false;
let skipEnemyTurn = false;

/* cooldown com max fixo */
let cooldown = {
  double:0, smoke:0, dash:0, ult:0,
  max: {double:2, smoke:3, dash:2, ult:5}
};

function startGame(){
  startScreen.style.display="none";
  menu.style.display="block";
}

function select(char){
  if(char==="kael") player={name:"Kael",hp:100,atk:9,mag:4};
  if(char==="lyra") player={name:"Lyra",hp:100,atk:5,mag:7};
  if(char==="dopamina") player={name:"Dopamina",hp:100,atk:8,mag:8};

  menu.style.display="none";
  game.style.display="block";
  update();
}

function clamp(v){ return Math.max(0,Math.min(100,v)); }
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

function checkGameOver(){

  if(enemy.hp <= 0){
    enemy.hp = 0;
    gameOver = true;
    update();
    setTimeout(()=>alert("Você venceu!"),300);
    return true;
  }

  if(player.hp <= 0){
    player.hp = 0;
    gameOver = true;
    update();
    setTimeout(()=>alert("Você perdeu!"),300);
    return true;
  }

  return false;
}

function update(){

  player.hp = clamp(player.hp);
  enemy.hp = clamp(enemy.hp);

  playerHp.style.width = player.hp+"%";
  enemyHp.style.width = enemy.hp+"%";

  playerLabel.innerText = player.name + " ("+player.hp+"%)";
  enemyLabel.innerText = "Inimigo ("+enemy.hp+"%)";

  status.innerText = gameOver
    ? "Fim de jogo"
    : `Rodada ${round} | ${playerTurn?"Sua vez ⚔️":"Inimigo..."}`;

  for(let k in cooldown){
    if(typeof cooldown[k]==="number" && cooldown[k]>0)
      cooldown[k]--;
  }

  render();
}

function endTurn(){
  if(gameOver) return;
  playerTurn=false;
  update();
  setTimeout(enemyTurn,1200);
}

async function enemyTurn(){

  if(gameOver) return;

  if(skipEnemyTurn){
    skipEnemyTurn=false;
    round++;
    playerTurn=true;
    update();
    return;
  }

  let dmg = Math.floor(Math.random()*10)+5;

  if(shield){
    dmg = Math.floor(dmg*0.5);
    shield=false;
  }

  player.hp -= dmg;
  damageText.innerText = "Inimigo causou "+dmg;

  if(checkGameOver()) return;

  await delay(1200);

  round++;
  playerTurn=true;
  update();
}

/* ===================== */
/* HELPERS UI COOLDOWN   */
/* ===================== */

function cooldownPct(name){
  if(cooldown[name] <= 0) return 0;
  return (cooldown[name] / cooldown.max[name]) * 100;
}

function btn(label, fn, key, ult=false){
  let pct = cooldownPct(key);
  let disabled = (cooldown[key] > 0 || gameOver || !playerTurn);

  return `
  <button onclick="${fn}()" ${disabled?"disabled":""} class="${ult?'ult':''}">
    <div class="cooldown-bar" style="transform:scaleX(${pct/100})"></div>
    <span>${label}${cooldown[key]>0?` (${cooldown[key]})`:''}</span>
  </button>`;
}

/* ===== ATAQUES ===== */

function kael_double(){
  if(!playerTurn || cooldown.double || gameOver) return;
  cooldown.double=2;
  enemy.hp -= player.atk*2;
  damageText.innerText="Dupla flamejante";
  if(checkGameOver()) return;
  endTurn();
}

function kael_smoke(){
  if(!playerTurn || cooldown.smoke || gameOver) return;
  cooldown.smoke=3;
  skipEnemyTurn=true;
  damageText.innerText="Fumaça";
  endTurn();
}

function kael_dash(){
  if(!playerTurn || cooldown.dash || gameOver) return;
  cooldown.dash=2;
  enemy.hp -= player.atk*2;
  damageText.innerText="Investida";
  if(checkGameOver()) return;
  endTurn();
}

function kael_ult(){
  if(!playerTurn || round<3 || cooldown.ult || gameOver) return;
  cooldown.ult=5;
  enemy.hp -= player.atk*4;
  damageText.innerText="FATALIDADE";
  if(checkGameOver()) return;
  endTurn();
}

/* ===== RENDER ===== */

function render(){

  let ultReady = round>=3 && cooldown.ult===0;

  if(player.name==="Kael"){
    actions.innerHTML=
      btn("Dupla","kael_double","double") +
      btn("Fumaça","kael_smoke","smoke") +
      btn("Investida","kael_dash","dash") +
      btn("ULT","kael_ult","ult",true).replace("disabled", ultReady?"":"disabled");
  }

}
</script>

</body>
</html>
