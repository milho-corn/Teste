<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini RPG Estável</title>

<style>
body {
  font-family: "Courier New", monospace;
  background: #fff;
  text-align: center;
}

/* ======================
   START SCREEN
====================== */
#startScreen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
}

#startScreen button {
  padding: 15px 25px;
  font-size: 18px;
  cursor: pointer;
  border: 2px solid #444;
  background: #eee;
}

/* MENU */
#menu {
  display: none;
}

.character-grid {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.card {
  width: 180px;
  border: 3px solid #444;
  padding: 15px;
  cursor: pointer;
  background: #f5f5f5;
}

.card:hover {
  transform: scale(1.05);
  background: #eaeaea;
}

/* GAME */
#game {
  display: none;
}

button {
  padding: 10px;
  margin: 5px;
  border: 2px solid #444;
  background: #eee;
  cursor: pointer;
}

.bar-container {
  width: 300px;
  border: 2px solid #444;
  margin: 10px auto;
  background: #ddd;
}

.bar {
  height: 18px;
  transition: 0.2s;
}

.player { background: green; }
.enemy { background: red; }

/* DANO */
#damageText {
  height: 20px;
  margin: 10px;
  font-weight: bold;
  color: #b30000;
}

/* HIT */
.hit {
  animation: hitAnim 0.2s;
}

@keyframes hitAnim {
  0% { transform: translateX(0); }
  50% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}
</style>
</head>

<body>

<!-- ======================
   START SCREEN
====================== -->
<div id="startScreen">
  <h1>Mini RPG</h1>
  <button onclick="startGame()">START THE GAME</button>
</div>

<!-- ======================
   MENU
====================== -->
<div id="menu">
  <h2>Escolha seu personagem</h2>

  <div class="character-grid">
    <div class="card" onclick="select('kael')">
      <h3>🔥 Kael</h3>
      <p>Assassino de fogo</p>
    </div>

    <div class="card" onclick="select('lyra')">
      <h3>🌪️ Lyra</h3>
      <p>Manipuladora de ar</p>
    </div>
  </div>
</div>

<!-- ======================
   GAME
====================== -->
<div id="game">
  <h2 id="name"></h2>

  <div class="bar-container">
    <div id="playerHp" class="bar player"></div>
  </div>

  <div class="bar-container">
    <div id="enemyHp" class="bar enemy"></div>
  </div>

  <p id="status"></p>
  <p id="damageText"></p>

  <div id="actions"></div>
</div>

<script>

/* ======================
   START FLOW
====================== */

function startGame() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("menu").style.display = "block";
}

/* ======================
   ESTADO
====================== */

let player = {};
let enemy = { hp: 100 };

let playerTurn = true;
let round = 1;

let shield = false;
let skipEnemyTurn = false;
let gameOver = false;

/* ======================
   START
====================== */

function select(char) {

  if (char === "kael") {
    player = { name:"Kael", hp:100, atk:9, mag:4 };
  }

  if (char === "lyra") {
    player = { name:"Lyra", hp:100, atk:5, mag:7 };
  }

  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  start();
}

function start() {
  document.getElementById("name").innerText = player.name;
  render();
  update();
}

/* ======================
   UTIL
====================== */

function clamp(v){
  return Math.max(0, Math.min(100, v));
}

function showDamage(text){
  const el = document.getElementById("damageText");
  el.innerText = text;
  setTimeout(() => el.innerText = "", 700);
}

function hitEnemy(){
  const bar = document.getElementById("enemyHp");
  bar.classList.add("hit");
  setTimeout(() => bar.classList.remove("hit"), 200);
}

/* ======================
   GAME OVER
====================== */

function checkGameOver() {

  if (gameOver) return;

  if (enemy.hp <= 0) {
    gameOver = true;
    enemy.hp = 0;
    update();
    setTimeout(() => {
      alert("Você venceu!");
      location.reload();
    }, 200);
    return;
  }

  if (player.hp <= 0) {
    gameOver = true;
    player.hp = 0;
    update();
    setTimeout(() => {
      alert("Você perdeu!");
      location.reload();
    }, 200);
    return;
  }
}

/* ======================
   UI
====================== */

function update() {

  if (gameOver) return;

  player.hp = clamp(player.hp);
  enemy.hp = clamp(enemy.hp);

  document.getElementById("playerHp").style.width = player.hp + "%";
  document.getElementById("enemyHp").style.width = enemy.hp + "%";

  document.getElementById("status").innerText =
    `Rodada ${round} | ` +
    (playerTurn ? "Sua vez ⚔️" : "Inimigo atacando 👾");
}

/* ======================
   TURNOS
====================== */

function endTurn() {

  if (gameOver) return;

  playerTurn = false;
  update();

  setTimeout(enemyTurn, 400);
}

function enemyTurn() {

  if (gameOver) return;

  if (skipEnemyTurn) {
    skipEnemyTurn = false;
    playerTurn = true;
    round++;
    update();
    return;
  }

  let dmg = Math.floor(Math.random() * 10) + 5;

  if (shield) {
    dmg = Math.floor(dmg * 0.5);
    shield = false;
  }

  player.hp -= dmg;

  checkGameOver();

  round++;
  playerTurn = true;
  update();
}

/* ======================
   KAEL
====================== */

function kael_double() {
  if (!playerTurn || gameOver) return;

  let d1 = Math.floor(player.atk * 0.7);
  let d2 = Math.floor(player.atk * 0.7);

  enemy.hp -= d1 + d2;

  hitEnemy();
  showDamage(`Kael causou ${d1 + d2} de dano`);

  checkGameOver();
  endTurn();
}

function kael_smoke() {
  if (!playerTurn || gameOver) return;

  skipEnemyTurn = true;
  showDamage("Kael usou fumaça!");

  endTurn();
}

function kael_dash() {
  if (!playerTurn || gameOver) return;

  let dmg = player.atk * 2;

  enemy.hp -= dmg;

  hitEnemy();
  showDamage(`Kael causou ${dmg} de dano`);

  checkGameOver();
  endTurn();
}

function kael_ult() {
  if (!playerTurn || gameOver) return;

  let dmg = player.atk * 4;

  enemy.hp -= dmg;

  hitEnemy();
  showDamage(`ULTIMATE! ${dmg} de dano`);

  checkGameOver();
  endTurn();
}

/* ======================
   LYRA
====================== */

function lyra_air() {
  if (!playerTurn || gameOver) return;

  let dmg = player.mag * 2;

  enemy.hp -= dmg;

  hitEnemy();
  showDamage(`Lyra causou ${dmg} de dano mágico`);

  checkGameOver();
  endTurn();
}

function lyra_fly() {
  if (!playerTurn || gameOver) return;

  let dmg = player.atk * 2;

  enemy.hp -= dmg;

  hitEnemy();
  showDamage(`Lyra atacou ${dmg} de dano`);

  checkGameOver();
  endTurn();
}

function lyra_shield() {
  if (!playerTurn || gameOver) return;

  shield = true;
  showDamage("Lyra ativou proteção");

  endTurn();
}

function lyra_ult() {
  if (!playerTurn || gameOver) return;

  let dmg = player.mag * 5;

  enemy.hp -= dmg;

  hitEnemy();
  showDamage(`FURACÃO! ${dmg} de dano`);

  checkGameOver();
  endTurn();
}

/* ======================
   BOTÕES
====================== */

function render() {

  if (player.name === "Kael") {
    document.getElementById("actions").innerHTML = `
      <button onclick="kael_double()">Duplo Corte</button>
      <button onclick="kael_smoke()">Fumaça</button>
      <button onclick="kael_dash()">Investida</button>
      <button onclick="kael_ult()">Ultimate</button>
    `;
  }

  if (player.name === "Lyra") {
    document.getElementById("actions").innerHTML = `
      <button onclick="lyra_air()">Sopro de Ar</button>
      <button onclick="lyra_fly()">Voo</button>
      <button onclick="lyra_shield()">Proteção</button>
      <button onclick="lyra_ult()">Furacão</button>
    `;
  }
}

</script>

</body>
</html>
