<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PTT Battle</title>

<style>
body { font-family: Arial; background:#eee; margin:0; }
#game { display:none; }

.screen {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card-box {
  background:white;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

.bar-container { background:#ccc; margin:6px 0; }
.bar { height:20px; }

.player{background:green;}
.enemy{background:red;}
.mana{background:blue;}
.xp{background:orange;}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

button{
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <div class="card-box">
    <h1>PTT Battle</h1>
    <input id="playerName" placeholder="Nome"><br><br>
    <button onclick="startGame()">START</button>
  </div>
</div>

<div id="game" class="screen">
  <div class="card-box">

    <div class="bar-container"><div id="enemyHp" class="bar enemy"></div></div>
    <div class="bar-container"><div id="playerHp" class="bar player"></div></div>
    <div class="bar-container"><div id="playerMana" class="bar mana"></div></div>
    <div class="bar-container"><div id="playerXp" class="bar xp"></div></div>

    <p id="playerLabel"></p>
    <p id="enemyLabel"></p>

    <p id="damageText"></p>

    <div id="actions" class="actions"></div>
    <br>
    <button id="continueBtn" style="display:none;" onclick="nextBattle()">Continuar</button>

  </div>
</div>

<script>

const startScreen = document.getElementById("startScreen");
const game = document.getElementById("game");

const playerHp = document.getElementById("playerHp");
const playerMana = document.getElementById("playerMana");
const playerXp = document.getElementById("playerXp");
const enemyHp = document.getElementById("enemyHp");

const playerLabel = document.getElementById("playerLabel");
const enemyLabel = document.getElementById("enemyLabel");
const damageText = document.getElementById("damageText");

const actions = document.getElementById("actions");
const continueBtn = document.getElementById("continueBtn");

let player;
let enemy;
let cooldown = [];

let wave = 1; // sistema de fases

const allSkills = [
  {name:"Soco", dmg:1.2, cost:0, cd:1, level:1},
  {name:"Corte", dmg:2, cost:20, cd:2, level:2},
  {name:"Explosão", dmg:3, cost:30, cd:3, level:3},
  {name:"Cura", heal:25, cost:25, cd:4, level:4},
  {name:"ULT", dmg:6, cost:60, cd:5, level:5}
];

function createEnemy(){
  enemy = {
    maxHp: 60 + player.level * 20,
    hp: 60 + player.level * 20
  };
}

function startGame(){

  let name = document.getElementById("playerName").value || "Herói";

  player = {
    name,
    hp:100,
    maxHp:100,
    mana:100,
    maxMana:100,
    atk:9,
    level:1,
    xp:0
  };

  wave = 1;
  createEnemy();

  startScreen.style.display="none";
  game.style.display="flex";

  update();
}

setInterval(()=>{
  if(player){
    player.mana = Math.min(player.maxMana, player.mana+3);
    cooldown = cooldown.map(c=>Math.max(0,c-1));
    render();
  }
},1000);

function gainXP(amount){
  player.xp += amount;

  let needed = player.level * 50;
  let unlocked = null;

  if(player.xp >= needed){
    player.xp -= needed;
    player.level++;
    player.maxHp += 10;
    player.maxMana += 10;
    player.atk += 2;

    unlocked = allSkills.find(s => s.level === player.level);
  }

  return unlocked;
}

function update(){

  playerHp.style.width = (player.hp/player.maxHp*100)+"%";
  playerMana.style.width = (player.mana/player.maxMana*100)+"%";
  playerXp.style.width = (player.xp/(player.level*50)*100)+"%";

  enemyHp.style.width = (enemy.hp/enemy.maxHp*100)+"%";

  playerLabel.innerText =
    player.name+" | Lv "+player.level+
    " | HP "+player.hp;

  enemyLabel.innerText = "Inimigo "+wave;

  render();
}

function render(){

  let list = allSkills.filter(s => player.level >= s.level);

  cooldown.length = list.length;
  for(let i=0;i<cooldown.length;i++){
    if(cooldown[i] === undefined) cooldown[i] = 0;
  }

  actions.innerHTML = list.map((s,i)=>{
    let cd = cooldown[i];
    let disabled = cd>0 || player.mana<s.cost;

    return `
      <button onclick="useSkill(${i})" ${disabled?"disabled":""}>
        ${s.name} (${s.cost}) ${cd>0?"[CD "+cd+"]":""}
      </button>
    `;
  }).join("");
}

function useSkill(i){

  let list = allSkills.filter(s => player.level >= s.level);
  let s = list[i];

  if(!s) return;
  if(cooldown[i]>0 || player.mana<s.cost) return;

  player.mana -= s.cost;
  cooldown[i] = s.cd;

  if(s.dmg){
    let dmg = Math.floor(s.dmg * player.atk);
    enemy.hp -= dmg;
    damageText.innerText = "💥 "+dmg+" dano";
  }

  if(s.heal){
    player.hp = Math.min(player.maxHp, player.hp + s.heal);
    damageText.innerText = "💚 +" + s.heal;
  }

  if(enemy.hp<=0){
    let unlocked = gainXP(25);

    // PRIMEIRA FASE TEM 2 INIMIGOS
    if(wave === 1){
      wave++;
      createEnemy();
      player.hp = Math.min(player.maxHp, player.hp + 20);
      damageText.innerText = "⚔️ Próximo inimigo! +20% HP";
      update();
      return;
    }

    // vitória completa
    continueBtn.style.display = "block";
    actions.innerHTML = "";

    damageText.innerText =
      "🏆 Vitória! +25 XP" +
      (unlocked ? " | Nova habilidade: "+unlocked.name : "");

    return;
  }

  update();
  setTimeout(enemyTurn,700);
}

function enemyTurn(){

  let dmg = Math.floor(3 + Math.random()*4 + player.level);

  player.hp -= dmg;

  damageText.innerText = "⚔️ "+dmg+" recebido";

  if(player.hp<=0){
    actions.innerHTML = "";
    continueBtn.style.display = "block";

    damageText.innerText = "💀 Você perdeu! Continue...";
    return;
  }

  update();
}

function nextBattle(){

  continueBtn.style.display = "none";

  // recuperação entre batalhas
  player.hp = Math.min(player.maxHp, player.hp + player.maxHp*0.2);
  player.mana = Math.min(player.maxMana, player.mana + player.maxMana*0.2);

  wave = 1;
  createEnemy();

  damageText.innerText = "✨ Descanso... +20% HP/Mana";

  update();
}

</script>

</body>
</html>
